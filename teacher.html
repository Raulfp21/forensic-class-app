<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher - DSMCH Forensic Control</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    body { background:#0a0a0a; color:#e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding:20px; margin:0;}
    .btn { padding:12px 20px; border-radius:6px; cursor:pointer; font-weight:bold; border:none; margin:5px; font-size:14px; transition: 0.2s;}
    .btn:hover { opacity:0.8; }
    
    .panel { background:#111; padding:20px; border-radius:10px; border:1px solid #222; display: flex; flex-direction: column; margin-bottom: 20px;}
    .dashboard-grid { display: flex; gap: 20px; align-items: stretch; }
    
    /* Roll Call Grid */
    .roll-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 6px; margin-top: 15px; }
    .roll-box { background: #333; color: #888; text-align: center; padding: 8px 0; border-radius: 4px; font-size: 13px; font-weight: bold; border: 1px solid #444; }
    
    /* Status Colors */
    .roll-box.active { background: #27ae60; color: white; border-color: #2ecc71; box-shadow: 0 0 10px rgba(46, 204, 113, 0.4); }
    .roll-box.submitted { background: #3498db; color: white; border-color: #2980b9; }
    .roll-box.warning { background: #e74c3c; color: white; border-color: #c0392b; animation: pulse 1.5s infinite; }
    .roll-box.warning-signal { background: #f1c40f; color: black; border-color: white; animation: pulse 0.5s infinite; font-weight: 900; }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

    /* Distinct Sidebar Lists */
    .list-container { max-height: 250px; overflow-y: auto; padding: 10px; border-radius: 8px; background: #000; margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px;}
    .sub-badge { background: #3498db; color: white; padding: 6px 10px; border-radius: 4px; font-weight: bold; font-size: 12px; border: 1px solid #2980b9; }
    .out-badge { background: #e74c3c; color: white; padding: 6px 10px; border-radius: 4px; font-weight: bold; font-size: 12px; border: 1px solid #c0392b; }

    .cheat-feed { background: #1a0f0f; border: 1px solid #6e2128; flex-grow: 1; overflow-y: auto; border-radius: 8px; padding: 10px; margin-top:15px; min-height: 150px; max-height: 250px;}
    .cheat-item { padding: 8px; border-bottom: 1px solid #3d1515; font-size: 12px; color: #fca5a5; }
    
    table { width:100%; border-collapse:collapse; margin-top:15px; background:#111; font-size: 14px;}
    th, td { padding:12px; text-align:left; border-bottom:1px solid #222; }
  </style>
</head>
<body>

<h1>👨‍🏫 DSMCH Forensic Invigilation Dashboard</h1>

<div class="panel">
    <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 15px;">
        <div style="flex-grow: 1; background: #222; padding: 15px; border-radius: 8px; border: 1px solid #333;">
            <h3 style="margin-top:0; color:#f39c12; font-size: 14px;">🔓 Emergency Student Unlock</h3>
            <input type="number" id="unlock-roll" placeholder="Roll No" style="padding:10px; border-radius:6px; border:none; background:#000; color:white; width:80px;">
            <button class="btn" style="background:#f39c12; color:black;" onclick="unlockStudent()">UNLOCK</button>
        </div>
        <div style="display: flex; gap: 5px;">
            <button class="btn" style="background:#2980b9; color:white;" onclick="setMode('live')">LECTURE</button>
            <button class="btn" style="background:#8e44ad; color:white;" onclick="setMode('testing')">FACULTY TEST</button>
            <button class="btn" style="background:#27ae60; color:white;" onclick="setMode('exam')">START EXAM</button>
            <button class="btn" style="background:#c0392b; color:white;" onclick="setMode('locked')">LOCK ALL</button>
        </div>
    </div>
</div>

<div class="dashboard-grid">
    <div class="panel" style="flex: 2;">
        <h3 style="color:#58a6ff; margin:0;">📍 Live Seat Map (<span id="online-count">0</span> Active)</h3>
        <div style="font-size:11px; color:#888; margin:8px 0;">
            Gray: Offline | Green: In Test | <span style="color:#f1c40f;">Yellow: Signal</span> | <span style="color:#e74c3c;">Red: Tab Switch</span> | <span style="color:#3498db;">Blue: Done</span>
        </div>
        <div id="master-roll-grid" class="roll-grid"></div>
    </div>

    <div style="flex: 1; display: flex; flex-direction: column; gap: 20px;">
        
        <div class="panel" style="border-color:#3498db; background: #0b162c;">
            <h3 style="color:#3498db; margin:0;">✅ COMPLETED (<span id="submit-count">0</span>)</h3>
            <div id="submit-list" class="list-container">
                <span style="color:#566573; font-size:12px; font-style:italic;">Awaiting first submission...</span>
            </div>
        </div>

        <div class="panel" style="border-color:#e74c3c; background: #2c0b0e;">
            <h3 style="color:#ff5e5e; margin:0;">⚠️ LEFT EXAM TAB (<span id="out-count">0</span>)</h3>
            <div id="out-list" class="list-container">
                <span style="color:#888; font-size:12px; font-style:italic;">No active violations.</span>
            </div>
        </div>

        <div class="panel" style="border-color:#6e2128;">
            <h3 style="color:#f78166; margin:0; font-size: 14px;">🚨 Historical Cheat Log</h3>
            <div id="cheat-feed-container" class="cheat-feed"></div>
        </div>
    </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA8IsW3dvtz4oFnGF3NOCHeNVGQsXn6h-c",
    authDomain: "forensic-class-app.firebaseapp.com",
    projectId: "forensic-class-app",
    storageBucket: "forensic-class-app.firebasestorage.app",
    messagingSenderId: "905219571923",
    appId: "1:905219571923:web:f6590bb9b3e36c565c9426"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let gridHtml = '';
  for(let i = 1; i <= 250; i++) { gridHtml += `<div id="roll-${i}" class="roll-box">${i}</div>`; }
  document.getElementById('master-roll-grid').innerHTML = gridHtml;

  async function unlockStudent() {
      const roll = document.getElementById('unlock-roll').value.trim();
      if(!roll) return;
      if(confirm(`Unlock Roll ${roll}?`)) {
          await db.collection("presence").doc(roll).delete();
          document.getElementById('unlock-roll').value = "";
      }
  }

  function setMode(m) {
      if(confirm("Switch to " + m.toUpperCase() + "?")) {
          db.collection("slides").doc("current").update({ status: m });
      }
  }

  db.collection("presence").onSnapshot(snap => {
      let activeCount = 0; let outCount = 0; let submitCount = 0;
      let outHtml = ''; let submitHtml = '';

      for(let i = 1; i <= 250; i++) { 
          let box = document.getElementById(`roll-${i}`); 
          if(box) { box.className = "roll-box"; box.innerText = i; }
      }

      snap.forEach(doc => {
          const d = doc.data();
          const box = document.getElementById(`roll-${d.roll}`);
          if(box) {
              if (d.status === "Signaling") {
                  box.className = "roll-box warning-signal";
                  box.innerText = d.roll + " (1)";
              } else if(d.status === "Taking Exam") {
                  box.className = "roll-box active";
                  activeCount++;
              } else if (d.status === "Submitted") {
                  box.className = "roll-box submitted";
                  submitCount++;
                  submitHtml += `<div class="sub-badge">${d.roll}</div>`;
              } else if (d.status === "Out of App") {
                  box.className = "roll-box warning";
                  outCount++;
                  outHtml += `<div class="out-badge">${d.roll}</div>`;
              }
          }
      });

      document.getElementById('online-count').innerText = activeCount;
      document.getElementById('out-count').innerText = outCount;
      document.getElementById('submit-count').innerText = submitCount;

      document.getElementById('submit-list').innerHTML = submitHtml || `<span style="color:#566573; font-size:12px; font-style:italic;">Awaiting first submission...</span>`;
      document.getElementById('out-list').innerHTML = outHtml || `<span style="color:#888; font-size:12px; font-style:italic;">No active violations.</span>`;
  });

  db.collection("cheat_alerts").orderBy("ts", "desc").limit(50).onSnapshot(snap => {
      let h = '';
      snap.forEach(doc => {
          const d = doc.data();
          const t = d.ts ? d.ts.toDate().toLocaleTimeString() : "";
          h += `<div class="cheat-item"><b>Roll ${d.roll}</b>: ${d.event} <small style="color:#666; float:right;">${t}</small></div>`;
      });
      document.getElementById('cheat-feed-container').innerHTML = h;
  });

  db.collection("exam_results").orderBy("ts", "desc").onSnapshot(snap => {
      let h = '';
      snap.forEach(doc => {
          const d = doc.data();
          const t = d.ts ? d.ts.toDate().toLocaleTimeString() : "-";
          h += `<tr><td>${d.student}</td><td style="color:#27ae60; font-weight:bold;">${d.score}/100</td><td>${t}</td></tr>`;
      });
      document.getElementById("resBody").innerHTML = h;
  });
</script>
</body>
</html>
