<!DOCTYPE html>
<html>
<head>
  <title>Teacher Control - Forensic Master-App</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; padding: 20px; }
    h1 { font-size: 20px; color: #00ff88; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 12px; }
    .stream-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; padding: 15px; background: #111; border-radius: 8px; border: 1px solid #222; }
    .btn-stream { padding: 12px 20px; font-size: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; border: none; font-family: 'Courier New', monospace; }
    .btn-fm { background: #58a6ff; color: #000; }
    .btn-phos { background: #ffa657; color: #000; }
    .top-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
    button { padding: 10px 24px; font-size: 16px; font-family: 'Courier New', monospace; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; }
    #btnPrev { background: #374151; color: #fff; }
    #btnNext { background: #00ff88; color: #000; }
    #slideInfo { font-size: 13px; color: #666; padding: 8px 14px; background: #111; border: 1px solid #222; border-radius: 6px; }
    #slidePreview { font-family: Arial, sans-serif; font-size: 14px; color: #e0e0e0; background: #111; border: 1px solid #1e3a2f; border-radius: 8px; padding: 15px; margin-bottom: 24px; max-height: 150px; overflow-y: auto; line-height: 1.5; }
    #slidePreview img { max-height: 80px; width: auto; border-radius: 4px; display: block; margin-top: 5px; }
    .section-title { font-size: 11px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
    .stats-row { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-box { background: #111; border: 1px solid #222; border-radius: 8px; padding: 12px 18px; min-width: 120px; }
    .stat-box .stat-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .stat-box .stat-value { font-size: 22px; font-weight: bold; }
    .stat-box.green .stat-value { color: #00ff88; }
    .stat-box.red .stat-value { color: #ff4444; }
    .stat-box.yellow .stat-value { color: #fbbf24; }
    #logTable { width: 100%; border-collapse: collapse; font-size: 13px; }
    #logTable th { text-align: left; padding: 8px 12px; color: #555; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; border-bottom: 1px solid #1a1a1a; }
    #logTable td { padding: 8px 12px; border-bottom: 1px solid #111; vertical-align: top; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
    .tag-left { background: #3b0000; color: #ff6b6b; }
    .tag-returned { background: #0a2e1a; color: #00cc66; }
    .tag-closed { background: #2a1a00; color: #ff9900; }
    .student-name { color: #60a5fa; }
    .slide-ctx { color: #555; font-size: 11px; }
    .time-cell { color: #444; font-size: 11px; }
    #clearBtn { background: #1a0000; color: #ff4444; border: 1px solid #3b0000; font-size: 12px; padding: 6px 14px; margin-left: auto; }
    .toolbar { display: flex; align-items: center; margin-bottom: 10px; }
    #logCount { font-size: 12px; color: #555; margin-left: 12px; }
    #flagList { display: flex; flex-wrap: wrap; gap: 8px; min-height: 36px; margin-bottom: 24px; }
    .flag-pill { background: #3b0000; color: #ff6b6b; border: 1px solid #5a0000; border-radius: 20px; padding: 4px 12px; font-size: 12px; }
    .no-flags { color: #2a2a2a; font-size: 12px; }
    .log-wrap { overflow-x: auto; border: 1px solid #1a1a1a; border-radius: 8px; }
  </style>
</head>
<body>

<h1>⚗ Forensic Class — Teacher Panel</h1>

<div class="stream-bar">
  <button class="btn-stream btn-fm" onclick="setTopic('fm216')">📺 STREAM: FM 2.16 (Monday/2024)</button>
  <button class="btn-stream btn-phos" onclick="setTopic('phosphorus')">📺 STREAM: Phosphorus (2023)</button>
</div>

<div class="top-bar">
  <button id="btnPrev" onclick="prev()">◀ Prev</button>
  <button id="btnNext" onclick="next()">Next ▶</button>
  <div id="slideInfo">Topic: — | Slide: —</div>
</div>

<div class="section-title">Current Slide Preview</div>
<div id="slidePreview">Loading...</div>

<div class="stats-row">
  <div class="stat-box green"><div class="stat-label">Currently Active</div><div class="stat-value" id="statActive">—</div></div>
  <div class="stat-box red"><div class="stat-label">Tab Switches</div><div class="stat-value" id="statLeft">0</div></div>
  <div class="stat-box yellow"><div class="stat-label">Total Events</div><div class="stat-value" id="statTotal">0</div></div>
</div>

<div class="section-title">🚨 Flagged Students (switched tabs)</div>
<div id="flagList"><span class="no-flags">None yet</span></div>

<div class="toolbar">
  <div class="section-title" style="margin:0;">Activity Log</div>
  <span id="logCount"></span>
  <button id="clearBtn" onclick="clearLogs()">Clear Logs</button>
</div>

<div class="log-wrap">
  <table id="logTable">
    <thead>
      <tr><th>Time</th><th>Student</th><th>Event</th><th>Slide Context</th></tr>
    </thead>
    <tbody id="logBody">
      <tr><td colspan="4" style="color:#333; padding:16px;">Waiting for activity...</td></tr>
    </tbody>
  </table>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA8IsW3dvtz4oFnGF3NOCHeNVGQsXn6h-c",
    authDomain: "forensic-class-app.firebaseapp.com",
    projectId: "forensic-class-app",
    storageBucket: "forensic-class-app.firebasestorage.app",
    messagingSenderId: "905219571923",
    appId: "1:905219571923:web:f6590bb9b3e36c565c9426"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const ref = db.collection("slides").doc("current");

  // Topic Library for preview
  const allTopics = {
    "fm216": [
      { render: () => `<div style="color:#58a6ff; font-weight:bold;">🦴 FM 2.16: Mutilated Remains</div><br><b>Reddy:</b> Disfigured bodies where limbs/parts are lost but soft tissue is attached.` },
      { render: () => `<div style="color:#58a6ff; font-weight:bold;">🔍 Preliminary Examination</div><br><img src="https://i.postimg.cc/mD8gM3X9/Screenshot-20260412-143112-OneDrive.jpg"><br>Record container details (Knot analysis).` },
      { render: () => `<div style="color:#58a6ff; font-weight:bold;">🐾 Animal vs Criminal Dismemberment</div><br><img src="https://i.postimg.cc/0jXyB6S6/Gemini-Generated-Image-xnmoitxnmoitxnmo.jpg"><br><b>Animal:</b> Scalloped edges, pits on bone.` },
      { render: () => `<div style="color:#58a6ff; font-weight:bold;">📏 Stature Calculation</div><br><b>Pearson's Factors:</b><br>Femur: Length x 3.7` },
      { render: () => `<div style="color:#58a6ff; font-weight:bold;">⚖️ Legal (BNS 2023)</div><br><span style="color:#f78166"><b>Section 238 BNS:</b></span> Causing disappearance of evidence of an offence.` }
    ],
    "phosphorus": [
      `💡 PHOSPHORUS IN TAMIL NADU\nHistory + Medicine + Forensics`,
      `👨‍🔬 1669 — Henning Brand\nSearching for Philosopher’s Stone`,
      `⚠️ PHOSSY JAW\nChronic exposure → Mandibular necrosis`,
      `⏳ LUCID INTERVAL (24–72 hrs)\nPatient feels NORMAL\n🚨 MOST DANGEROUS PHASE`
    ]
  };

  function setTopic(topicName) {
    ref.update({ topic: topicName, index: 0 });
  }

  function next() { ref.update({ index: firebase.firestore.FieldValue.increment(1) }); }
  function prev() { ref.update({ index: firebase.firestore.FieldValue.increment(-1) }); }

  let currentTopic = "fm216";
  let currentIndex = 0;

  ref.onSnapshot((doc) => {
    if (!doc.exists) return;
    const data = doc.data();
    currentTopic = data.topic || "fm216";
    currentIndex = Number(data.index) || 0;
    
    const maxSlides = allTopics[currentTopic] ? allTopics[currentTopic].length : 0;
    document.getElementById("slideInfo").innerText = `Topic: ${currentTopic.toUpperCase()} | Slide: ${currentIndex + 1} / ${maxSlides}`;
    
    const slideData = allTopics[currentTopic][currentIndex];
    if (!slideData) document.getElementById("slidePreview").innerHTML = "End of Lecture";
    else if (typeof slideData === "string") document.getElementById("slidePreview").innerHTML = slideData;
    else document.getElementById("slidePreview").innerHTML = slideData.render();
  });

  const tbody = document.getElementById("logBody");
  const flaggedStudents = new Set();

  db.collection("activity_logs").orderBy("timestamp", "desc").limit(100).onSnapshot((snapshot) => {
      let leftCount = 0;
      let activeSet = new Set();
      const rows = [];

      snapshot.forEach((doc) => {
        const d = doc.data();
        const event = d.event || "";
        const student = d.student || "Unknown";
        const ctx = d.slideContext || d.slideIndex || "";
        const ts = d.timestamp ? d.timestamp.toDate() : null;
        const timeStr = ts ? ts.toLocaleTimeString("en-IN", { hour:"2-digit", minute:"2-digit", second:"2-digit" }) : "—";

        if (event.includes("Left") || event.includes("Switched")) { leftCount++; flaggedStudents.add(student); }
        if (event.includes("Returned")) activeSet.add(student);

        // ✅ THIS WAS THE BUG. IT IS NOW FIXED.
        let tagClass = "tag-left";
        if (event.includes("Returned")) tagClass = "tag-returned";
        else if (event.includes("Closed")) tagClass = "tag-closed";

        rows.push(`<tr>
          <td class="time-cell">${timeStr}</td>
          <td class="student-name">${student}</td>
          <td><span class="tag ${tagClass}">${event}</span></td>
          <td class="slide-ctx">${ctx.replace(/<[^>]*>?/gm, '').substring(0, 30)}...</td>
        </tr>`);
      });

      tbody.innerHTML = rows.length > 0 ? rows.join("") : `<tr><td colspan="4" style="color:#333;padding:16px;">No activity yet</td></tr>`;
      document.getElementById("statLeft").innerText = leftCount;
      document.getElementById("statTotal").innerText = snapshot.size;
      document.getElementById("statActive").innerText = activeSet.size;
      document.getElementById("logCount").innerText = `(${snapshot.size} events)`;

      const flagList = document.getElementById("flagList");
      flagList.innerHTML = flaggedStudents.size === 0 ? `<span class="no-flags">None yet</span>` : Array.from(flaggedStudents).map(s => `<span class="flag-pill">⚠ ${s}</span>`).join("");
    });

  async function clearLogs() {
    if (!confirm("Clear all activity logs?")) return;
    const snap = await db.collection("activity_logs").get();
    const batch = db.batch();
    snap.forEach(doc => batch.delete(doc.ref));
    await batch.commit();
    flaggedStudents.clear();
  }
</script>

</body>
</html>
