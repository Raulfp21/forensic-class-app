<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>DSMCH Instructor - Skills Matrix</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="config.js"></script><script src="topics.js"></script>
  <style>
    body { background:#0a0a0a; color:#e0e0e0; font-family: sans-serif; padding:20px; }
    .panel { background:#111; padding:20px; border-radius:12px; border:1px solid #333; margin-bottom:20px; }
    .btn { padding:12px 20px; border-radius:8px; cursor:pointer; font-weight:bold; border:none; margin:5px; }
    .btn-blue { background:#58a6ff; color:black; }
    .btn-green { background:#238636; color:white; }
    .btn-red { background:#da3633; color:white; }
    .roll-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap:8px; margin-top:15px; }
    .roll-box { background:#222; text-align:center; padding:10px 0; border-radius:6px; font-size:11px; border:1px solid #333; }
    .roll-box.active { background:#238636; color:white; }
    .roll-box.warning { background:#da3633; color:white; animation:pulse 1s infinite; }
    @keyframes pulse { 50% { opacity:0.5; } }
    table { width:100%; border-collapse:collapse; margin-top:20px; }
    th, td { padding:12px; text-align:left; border-bottom:1px solid #333; }
    .error-tag { background:#3b110e; color:#ff7b72; padding:2px 6px; border-radius:4px; font-size:11px; margin-right:4px; }
  </style>
</head>
<body>
  <h1>👨‍🏫 DSMCH Instructor Dashboard</h1>
  <div class="panel" style="border-left: 5px solid #666;">
    <h3 style="margin-top:0; color:#8b949e;">⚠️ Not Started / Inactive Students</h3>
    <div id="inactive-list" style="display:flex; flex-wrap:wrap; gap:10px; font-size:12px; color:#666;">
        Waiting for class start...
    </div>
</div>

<script>
  firebase.initializeApp(firebaseConfig); 
  const db = firebase.firestore();

  // 1. Initialize Grid
  for(let i=1; i<=255; i++) {
      document.getElementById('master-grid').innerHTML += `<div id="seat-${i}" class="roll-box">${i}</div>`;
  }

  // 2. Identify Inactive Students
  function updateInactiveList(activeRolls) {
      const allRegs = Object.keys(studentsAll);
      // Filter out anyone who has sent a presence signal
      const inactiveNames = allRegs
          .filter(reg => !activeRolls.includes(reg))
          .map(reg => `<span style="background:#21262d; padding:4px 8px; border-radius:4px;">${studentsAll[reg]} (${reg.slice(-3)})</span>`);
      
      document.getElementById('inactive-list').innerHTML = inactiveNames.length > 0 
          ? inactiveNames.join('') 
          : "<span style='color:var(--success)'>✅ All students are active!</span>";
  }

  // 3. Monitor Presence & Status
  db.collection("presence").onSnapshot(snap => {
      let activeRolls = [];
      
      // Reset Grid Visuals
      document.querySelectorAll('.roll-box').forEach(el => el.className = "roll-box");

      snap.forEach(doc => {
          const d = doc.data();
          activeRolls.push(d.roll);
          const seatNum = parseInt(d.roll.toString().slice(-3));
          const el = document.getElementById(`seat-${seatNum}`);
          
          if(el) {
              if(d.status === "Out of App") el.className = "roll-box warning"; // Red flashing
              else if(d.status.includes("Relay") || d.status === "Active") el.className = "roll-box active"; // Green
              else if(d.status === "Submitted") el.className = "roll-box active"; // Keep green or add a 'done' class
          }
      });

      // Update the "Not doing anything" list
      updateInactiveList(activeRolls);
  });

  // 4. Skills Matrix Listener
  db.collection("simulation_scores").orderBy("ts", "desc").onSnapshot(snap => {
      let h = '';
      snap.forEach(doc => {
          const d = doc.data(); 
          let errors = d.log.filter(l => l.includes('❌')).map(l => `<span class="error-tag">${l.split(':')[0]}</span>`).join(' ');
          h += `<tr><td>${d.student}<br><small>${d.scenario}</small></td><td><b>${d.score}/6</b></td><td>${errors || 'Professional'}</td></tr>`;
      });
      document.getElementById('skills-body').innerHTML = h;
  });

  function setMode(m) {
      db.collection("slides").doc("current").set({ status: m, ts: firebase.firestore.FieldValue.serverTimestamp() });
  }
</script>
</body>
</html>
