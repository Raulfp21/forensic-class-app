<!DOCTYPE html>
<html>
<head>
  <title>Teacher - Toxicology Control</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    body { background:#0a0a0a; color:#e0e0e0; font-family: monospace; padding:20px; }
    .btn { padding:12px 20px; border-radius:6px; cursor:pointer; font-weight:bold; border:none; margin:5px; font-family: monospace; font-size:14px; }
    .btn:hover { opacity:0.8; }
    #resTable { width:100%; border-collapse:collapse; margin-top:20px; background:#111; border:1px solid #222; }
    #resTable th, #resTable td { padding:12px; text-align:left; border-bottom:1px solid #222; }
  </style>
</head>
<body>

<h1>⚗ DSMCH Teacher Control Panel</h1>
<div style="background:#111; padding:20px; border-radius:10px; border:1px solid #222;">
    <button class="btn" style="background:#2980b9; color:white;" onclick="setMode('live')">📺 START LECTURE (Slides)</button>
    <button class="btn" style="background:#8e44ad; color:white;" onclick="setMode('testing')">🛠 START FACULTY TESTING (MCQ)</button>
    <button class="btn" style="background:#27ae60; color:white;" onclick="setMode('exam')">📝 START STUDENT EXAM (100 MCQ)</button>
    <button class="btn" style="background:#c0392b; color:white;" onclick="setMode('locked')">🔒 LOCK APP</button>
</div>

<h2 style="color:#27ae60; margin-top:30px;">📊 Live Exam Results</h2>
<button class="btn" style="background:#f39c12; color:black; margin-bottom:10px;" onclick="exportResults()">Download CSV</button>
<table id="resTable">
    <thead><tr><th>Student/Faculty ID</th><th>Score</th><th>Submitted Time</th></tr></thead>
    <tbody id="resBody"></tbody>
</table>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA8IsW3dvtz4oFnGF3NOCHeNVGQsXn6h-c",
    authDomain: "forensic-class-app.firebaseapp.com",
    projectId: "forensic-class-app",
    storageBucket: "forensic-class-app.firebasestorage.app",
    messagingSenderId: "905219571923",
    appId: "1:905219571923:web:f6590bb9b3e36c565c9426"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function setMode(m) {
      if(confirm("Change class mode to: " + m.toUpperCase() + "?")) {
          db.collection("slides").doc("current").update({ status: m });
      }
  }

  let resultData = [];
  db.collection("exam_results").orderBy("ts", "desc").onSnapshot(snap => {
      let h = '';
      resultData = [];
      snap.forEach(doc => {
          const d = doc.data();
          const t = d.ts ? d.ts.toDate().toLocaleTimeString("en-IN") : "-";
          h += `<tr><td>${d.student}</td><td style="color:#27ae60; font-weight:bold;">${d.score} / 100</td><td>${t}</td></tr>`;
          resultData.push({ student: d.student, score: d.score, time: t });
      });
      document.getElementById('resBody').innerHTML = h;
  });

  function exportResults() {
      let csv = "data:text/csv;charset=utf-8,Student Identity,Score,Time\n";
      resultData.forEach(r => { csv += `"${r.student}","${r.score}","${r.time}"\n`; });
      const link = document.createElement("a");
      link.href = encodeURI(csv);
      link.download = `Forensic_Exam_Results.csv`;
      link.click();
  }
</script>
</body>
</html>
