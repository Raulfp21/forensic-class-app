<!DOCTYPE html>
<html>
<head>
  <title>Teacher Control</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

<h2>Teacher Panel</h2>

<button onclick="next()">Next</button>
<button onclick="prev()">Previous</button>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA8IsW3dvtz4oFnGF3NOCHeNVGQsXn6h-c",
  authDomain: "forensic-class-app.firebaseapp.com",
  projectId: "forensic-class-app",
  storageBucket: "forensic-class-app.firebasestorage.app",
  messagingSenderId: "905219571923",
  appId: "1:905219571923:web:f6590bb9b3e36c565c9426"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const ref = db.collection("slides").doc("current");

  function next() {
    ref.update({
      index: firebase.firestore.FieldValue.increment(1)
    });
  }

  function prev() {
    ref.update({
      index: firebase.firestore.FieldValue.increment(-1)
    });
  }
</script>

</body>
</html>
