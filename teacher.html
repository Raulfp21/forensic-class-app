<!DOCTYPE html>
<html>
<head>
  <title>Teacher Control - Toxicology Master</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; padding: 20px; }
    h1 { font-size: 20px; color: #00ff88; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 12px; }
    .stream-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; padding: 15px; background: #111; border-radius: 8px; border: 1px solid #222; }
    .btn-stream { padding: 12px 20px; font-size: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; border: none; font-family: 'Courier New', monospace; background: #58a6ff; color:#000;}
    .top-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
    button { padding: 10px 24px; font-size: 16px; font-family: 'Courier New', monospace; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; }
    #btnPrev { background: #374151; color: #fff; }
    #btnNext { background: #00ff88; color: #000; }
    .btn-lock { background: #ff4444; color: white; }
    .btn-unlock { background: #0d2a1a; color: #00ff88; border: 1px solid #00ff88; }
    #slideInfo { font-size: 13px; color: #666; padding: 8px 14px; background: #111; border: 1px solid #222; border-radius: 6px; }
    #slidePreview { font-family: Arial, sans-serif; font-size: 14px; color: #e0e0e0; background: #111; border: 1px solid #1e3a2f; border-radius: 8px; padding: 15px; margin-bottom: 24px; max-height: 200px; overflow-y: auto; line-height: 1.5; }
    .section-title { font-size: 11px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
    .stats-row { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-box { background: #111; border: 1px solid #222; border-radius: 8px; padding: 12px 18px; min-width: 120px; }
    .stat-box .stat-label { font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 4px; }
    .stat-box .stat-value { font-size: 22px; font-weight: bold; }
    .stat-box.green .stat-value { color: #00ff88; }
    .stat-box.red .stat-value { color: #ff4444; }
    #logTable { width: 100%; border-collapse: collapse; font-size: 13px; }
    #logTable th { text-align: left; padding: 8px; color: #555; font-size: 10px; text-transform: uppercase; border-bottom: 1px solid #1a1a1a; }
    #logTable td { padding: 8px; border-bottom: 1px solid #111; vertical-align: top; }
    #activeNamesWrap { display: flex; flex-wrap: wrap; gap: 8px; min-height: 36px; margin-bottom: 24px; }
    .flag-pill { border-radius: 20px; padding: 4px 12px; font-size: 12px; border:1px solid #004422;}
  </style>
</head>
<body>

<h1>⚗ Toxicology Class Control</h1>

<div class="stream-bar">
  <button class="btn-stream" onclick="setTopic('phosphorus')">📺 STREAM: FM 2.16 (Toxicology 30 Slides)</button>
</div>

<div class="top-bar">
  <button id="btnPrev" onclick="prev()">◀ Prev</button>
  <button id="btnNext" onclick="next()">Next ▶</button>
  <span style="color:#444;">|</span>
  <button class="btn-lock" onclick="setSessionStatus('locked')">🔒 End & Lock</button>
  <button class="btn-unlock" onclick="setSessionStatus('live')">🔓 Unlock</button>
  <button class="btn-unlock" style="background:#ffcc00; color:#000; margin-left:auto;" onclick="unblockStudent()">🔓 Unblock ID</button>
  <div id="slideInfo">Topic: — | Slide: —</div>
</div>

<div class="section-title">Current Slide Preview</div>
<div id="slidePreview">Loading...</div>

<div class="stats-row">
  <div class="stat-box green"><div class="stat-label">Active Users</div><div class="stat-value" id="statActive">0</div></div>
  <div class="stat-box red"><div class="stat-label">Left/Switched</div><div class="stat-value" id="statLeft">0</div></div>
</div>

<div class="section-title" style="color: #00ff88;">✅ Actively Interacting Users</div>
<div id="activeNamesWrap"><span style="color:#444;font-size:12px;">Waiting...</span></div>

<div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center;">
  <div class="section-title" style="margin:0;">Live Activity Log</div>
  <div>
    <button onclick="exportAttendance()" style="background:#00ff88;color:#000;padding:6px 14px;font-size:12px;">Download Report</button>
    <button onclick="clearLogs()" style="background:#1a0000;color:#ff4444;border:1px solid #3b0000;padding:6px 14px;font-size:12px;">Clear Logs</button>
  </div>
</div>

<div style="overflow-x:auto; border:1px solid #1a1a1a; border-radius:8px;">
  <table id="logTable">
    <thead><tr><th>Time</th><th>Student</th><th>Event</th><th>Context</th></tr></thead>
    <tbody id="logBody"><tr><td colspan="4" style="padding:16px;">Waiting...</td></tr></tbody>
  </table>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA8IsW3dvtz4oFnGF3NOCHeNVGQsXn6h-c",
    authDomain: "forensic-class-app.firebaseapp.com",
    projectId: "forensic-class-app",
    storageBucket: "forensic-class-app.firebasestorage.app",
    messagingSenderId: "905219571923",
    appId: "1:905219571923:web:f6590bb9b3e36c565c9426"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const ref = db.collection("slides").doc("current");

  const allTopics = {
    "phosphorus": Array(30).fill(0).map((_, i) => {
        if(i < 9) return `<b>Phosphorus — Slide ${i+1}</b><br>Check student view.`;
        else return `<b>Plant Poisons — Slide ${i+1}</b><br>Check student view.`;
    })
  };

  function setTopic(topicName) { ref.update({ topic: topicName, index: 0, status: "live" }); }
  function next() { ref.update({ index: firebase.firestore.FieldValue.increment(1) }); }
  function prev() { ref.update({ index: firebase.firestore.FieldValue.increment(-1) }); }
  function setSessionStatus(ns) { ref.update({ status: ns }); }

  async function unblockStudent() {
      let reg = prompt("Enter Exact Name to unblock:");
      if (!reg) return;
      await db.collection("device_bindings").doc(reg.trim().toUpperCase()).delete();
      alert("✅ Unblocked!");
  }

  ref.onSnapshot((doc) => {
    if (!doc.exists) return;
    const d = doc.data();
    if (d.status === "locked") { document.getElementById("slidePreview").innerHTML = "🔒 LOCKED"; return; }
    let topic = d.topic || "phosphorus";
    let idx = Number(d.index) || 0;
    let max = allTopics[topic] ? allTopics[topic].length : 0;
    document.getElementById("slideInfo").innerText = `Topic: ${topic.toUpperCase()} | Slide: ${idx + 1} / ${max}`;
    document.getElementById("slidePreview").innerHTML = allTopics[topic][idx] || "End of Lecture";
  });

  db.collection("activity_logs").orderBy("timestamp", "desc").limit(100).onSnapshot((snap) => {
      let activeSet = new Set();
      let leftCount = 0;
      let rows = [];
      snap.forEach(doc => {
        const d = doc.data();
        if (d.student.includes("FACULTY")) return;
        if (d.event.includes("Left")) { leftCount++; activeSet.delete(d.student); }
        else { activeSet.add(d.student); }
        rows.push(`<tr><td style="color:#444;">${d.timestamp ? d.timestamp.toDate().toLocaleTimeString() : "-"}</td><td style="color:#60a5fa;">${d.student}</td><td style="color:#00cc66;">${d.event}</td><td style="color:#555;">${d.slideContext.substring(0,25)}...</td></tr>`);
      });
      document.getElementById("logBody").innerHTML = rows.join("");
      document.getElementById("statActive").innerText = activeSet.size;
      document.getElementById("statLeft").innerText = leftCount;
      document.getElementById("activeNamesWrap").innerHTML = Array.from(activeSet).map(s => `<span class="flag-pill" style="background:#0d2a1a;color:#00ff88;">${s}</span>`).join("");
  });

  async function clearLogs() {
    if(!confirm("Clear all?")) return;
    const snap = await db.collection("activity_logs").get();
    const batch = db.batch();
    snap.forEach(doc => batch.delete(doc.ref));
    await batch.commit();
  }

  async function exportAttendance() {
    const snap = await db.collection("activity_logs").orderBy("timestamp", "asc").get();
    let data = {};
    snap.forEach(doc => {
        const d = doc.data();
        if (d.student.includes("FACULTY")) return;
        if (!data[d.student]) data[d.student] = { interactions: 0 };
        data[d.student].interactions++;
    });
    let csv = "data:text/csv;charset=utf-8,Student Name,Interactions\n";
    Object.keys(data).forEach(k => csv += `"${k}","${data[k].interactions}"\n`);
    const link = document.createElement("a");
    link.href = encodeURI(csv);
    link.download = `Attendance_${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
  }
</script>
</body>
</html>
