<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>DSMCH Instructor Dashboard</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="config.js"></script><script src="topics.js"></script>
  <style>
    :root { --bg: #0a0a0a; --panel: #111; --accent: #58a6ff; --success: #238636; --danger: #da3633; --muted: #8b949e; }
    body { background: var(--bg); color: #e6edf3; font-family: sans-serif; padding: 20px; }
    .panel { background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
    .btn { padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; border: none; margin: 3px; font-size: 11px; transition: 0.2s; }
    .btn-blue { background: var(--accent); color: #0d1117; }
    .btn-green { background: var(--success); color: white; }
    .btn-red { background: var(--danger); color: white; }
    .btn-gray { background: #333; color: white; }
    .name-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; margin-top: 15px; }
    .name-card { background: #161b22; padding: 12px; border-radius: 8px; border: 1px solid #333; text-align: center; font-size: 11px; }
    .name-card.warning { background: var(--danger); animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0.5; } }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
    th, td { padding: 10px; text-align: left; border-bottom: 1px solid #333; }
    .error-tag { background: #3b110e; color: #ff7b72; padding: 2px 5px; border-radius: 4px; font-size: 10px; margin-right: 3px; }
  </style>
</head>
<body>
  <h2>👨‍🏫 Instructor Control Center</h2>
  
  <div class="panel">
    <h3 style="margin-top:0; color:var(--muted); font-size:14px;">1. BROADCAST TEACHING SLIDES</h3>
    <div id="slide-btns"></div>
    <script>
      const sContainer = document.getElementById('slide-btns');
      forensicSlides.forEach(s => {
        sContainer.innerHTML += `<button class="btn btn-blue" onclick="setMode('slide-${s.id}')">Slide ${s.id}</button>`;
      });
    </script>
  </div>

  <div class="panel">
    <h3 style="margin-top:0; color:var(--muted); font-size:14px;">2. GAME CONTROLS (Batch Gated)</h3>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <div style="background:#0d1117; padding:10px; border-radius:8px;">
            <small>2024 BATCH</small><br>
            <button class="btn btn-blue" onclick="setMode('relay-2024')">Start Relay</button>
            <button class="btn btn-green" onclick="setMode('exam-2024')">Start Practical</button>
        </div>
        <div style="background:#0d1117; padding:10px; border-radius:8px;">
            <small>2023 BATCH</small><br>
            <button class="btn btn-blue" onclick="setMode('relay-2023')">Start Relay</button>
            <button class="btn btn-green" onclick="setMode('exam-2023')">Start Practical</button>
        </div>
        <div style="padding:10px;">
            <small>TESTING</small><br>
            <button class="btn btn-gray" onclick="setMode('testing')">Faculty Only (1-10)</button>
        </div>
    </div>
    <div style="margin-top:10px;">
        <button class="btn btn-red" onclick="setMode('locked')">🔒 LOCK ALL</button>
        <button class="btn btn-gray" onclick="setMode('idle')">⏹️ STOP ALL</button>
    </div>
  </div>

  <div class="panel">
    <h3>📍 Active Participation (Names)</h3>
    <div class="name-grid" id="active-grid"></div>
  </div>

  <div class="panel">
    <h3>📊 Practical Skills Matrix</h3>
    <table id="matrix-table">
        <thead><tr style="color:var(--muted);"><th>Student</th><th>Score</th><th>Errors</th></tr></thead>
        <tbody id="matrix-body"></tbody>
    </table>
  </div>

<script>
  firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
  function setMode(m) { db.collection("slides").doc("current").set({ status: m, ts: firebase.firestore.FieldValue.serverTimestamp() }); }
  
  db.collection("presence").onSnapshot(snap => {
      let h = ''; snap.forEach(doc => {
          const d = doc.data(); const sClass = (d.status === "Out of App") ? "name-card warning" : "name-card active";
          h += `<div class="${sClass}"><strong>${d.name}</strong><br><small style="color:var(--muted)">${d.roll}</small><br><div style="color:var(--accent); font-size:10px; margin-top:5px;">${d.status}</div></div>`;
      });
      document.getElementById('active-grid').innerHTML = h || 'No students active.';
  });

  db.collection("simulation_scores").orderBy("ts", "desc").onSnapshot(snap => {
      let h = ''; snap.forEach(doc => {
          const d = doc.data(); const name = studentsAll[d.student] || d.student;
          let errs = d.log.filter(l => l.includes('❌')).map(l => `<span class="error-tag">${l.split(':')[0]}</span>`).join('');
          h += `<tr style="border-bottom:1px solid #333;"><td style="padding:10px;"><b>${name}</b><br><small>${d.scenario.toUpperCase()}</small></td><td><b>${d.score}/8</b></td><td>${errs || 'None'}</td></tr>`;
      });
      document.getElementById('matrix-body').innerHTML = h;
  });
</script>
</body>
</html>
