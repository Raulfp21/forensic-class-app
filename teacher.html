<!DOCTYPE html>
<html>
<head>
  <title>Teacher Panel - DSMCH Forensic</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; padding: 25px; margin: 0; }
    h1 { margin: 0 0 20px; color: #00ff88; }
    .control-box { background: #111; border: 1px solid #222; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    .control-box h3 { margin: 0 0 14px; }
    .stat-row { display: flex; gap: 20px; margin-bottom: 20px; }
    .stat-card { flex: 1; background: #111; border: 1px solid #222; padding: 15px; border-radius: 10px; text-align: center; }
    .stat-card .num { color: #00ff88; font-size: 36px; font-weight: bold; }
    .stat-card .lbl { font-size: 11px; text-transform: uppercase; color: #666; margin-top: 4px; }
    .name-pill { background: #0d2a1a; color: #00ff88; border: 1px solid #004422; padding: 6px 14px; border-radius: 20px; font-size: 11px; margin: 4px; display: inline-block; font-weight: bold; }
    .btn { padding: 12px 18px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; margin-right: 10px; margin-bottom: 8px; font-size: 14px; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    #status-msg { margin-top: 10px; font-size: 13px; color: #00ff88; min-height: 18px; }
  </style>
</head>
<body>

<h1>Live Class Control</h1>

<div class="stat-row">
  <div class="stat-card">
    <div class="num" id="activeCount">0</div>
    <div class="lbl">Currently Active</div>
  </div>
  <div class="stat-card">
    <div class="num" id="totalCount">0</div>
    <div class="lbl">Total Logged Today</div>
  </div>
</div>

<div class="control-box">
  <h3 style="color:#00ff88;">Verified Active Students</h3>
  <div id="activeNamesWrap"><span style="color:#444;">No activity yet...</span></div>
</div>

<div class="control-box">
  <h3>Lecture Control</h3>
  <button class="btn" style="background:#00ff88; color:#000;" onclick="setSlide('phosphorus', 0)">Start Phosphorus (2023)</button>
  <button class="btn" style="background:#38bdf8; color:#000;" onclick="setSlide('fm216', 0)">Start FM 2.16 (2024)</button>
  <button class="btn" style="background:#ff4400; color:#fff;" onclick="exportAttendance()">Download Attendance Excel</button>
  <div id="status-msg"></div>
</div>

<script>
// --- FIREBASE CONFIG ---
  const firebaseConfig = {
    apiKey: "AIzaSyA8IsW3dvtz4oFnGF3NOCHeNVGQsXn6h-c",
    authDomain: "forensic-class-app.firebaseapp.com",
    projectId: "forensic-class-app",
    storageBucket: "forensic-class-app.firebasestorage.app",
    messagingSenderId: "905219571923",
    appId: "1:905219571923:web:f6590bb9b3e36c565c9426"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  /* ── SET SLIDE ── */
  function setSlide(topic, index) {
    db.collection("slides").doc("current")
      .set({ topic, index, status: "live" })
      .then(() => showStatus("Slide set: " + topic + " #" + index));
  }

  /* ── STATUS MESSAGE ── */
  function showStatus(msg) {
    const el = document.getElementById("status-msg");
    el.innerText = msg;
    setTimeout(() => el.innerText = "", 4000);
  }

  /* ── LIVE ACTIVE STUDENTS ──
     Tracks most-recent event per student.
     A student is "active" only if their latest event is NOT a Leave/Close.
  */
  db.collection("activity_logs")
    .orderBy("timestamp", "desc")
    .limit(500)
    .onSnapshot(snap => {
      const latestEvent = {};
      const todaySet    = new Set();

      snap.forEach(doc => {
        const d = doc.data();
        if (!d.student) return;
        todaySet.add(d.student);
        if (!(d.student in latestEvent)) {
          latestEvent[d.student] = d.event || "";
        }
      });

      const LEAVE_KEYWORDS = ["left", "closed", "hidden", "blur", "inactive"];
      const activeSet = new Set(
        Object.entries(latestEvent)
          .filter(([, ev]) => !LEAVE_KEYWORDS.some(k => ev.toLowerCase().includes(k)))
          .map(([id]) => id)
      );

      document.getElementById("activeCount").innerText = activeSet.size;
      document.getElementById("totalCount").innerText  = todaySet.size;

      const wrap = document.getElementById("activeNamesWrap");
      wrap.innerHTML = activeSet.size
        ? Array.from(activeSet).sort().map(name =>
            `<span class="name-pill">${name}</span>`).join("")
        : '<span style="color:#444;">No students currently active</span>';
    });

  /* ── EXPORT ATTENDANCE ── */
  async function exportAttendance() {
    showStatus("Fetching logs...");
    try {
      const snap = await db.collection("activity_logs")
        .orderBy("timestamp", "asc")
        .limit(2000)
        .get();

      const rows = [["Student", "Device ID", "Event", "Timestamp", "Slide Context"]];
      snap.forEach(doc => {
        const d = doc.data();
        rows.push([
          d.student      || "",
          d.deviceId     || "",
          d.event        || "",
          d.timestamp    ? d.timestamp.toDate().toLocaleString() : "",
          d.slideContext || ""
        ]);
      });

      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws["!cols"] = [{ wch: 30 }, { wch: 18 }, { wch: 25 }, { wch: 22 }, { wch: 20 }];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Attendance");

      const date = new Date().toISOString().slice(0, 10);
      XLSX.writeFile(wb, `DSMCH_Attendance_${date}.xlsx`);
      showStatus("Excel downloaded!");
    } catch (err) {
      showStatus("Export failed: " + err.message);
    }
  }
</script>
</body>
</html>
