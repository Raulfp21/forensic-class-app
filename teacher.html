<!DOCTYPE html>
<html>
<head>
  <title>Teacher - Exam Control Center</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    body { background:#0a0a0a; color:#e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding:20px; margin:0;}
    .btn { padding:12px 20px; border-radius:6px; cursor:pointer; font-weight:bold; border:none; margin:5px; font-size:14px; transition: 0.2s;}
    .btn:hover { opacity:0.8; }
    
    .dashboard-grid { display: flex; gap: 20px; margin-top: 20px; }
    .panel { background:#111; padding:20px; border-radius:10px; border:1px solid #222; }
    
    /* Roll Call Grid */
    .roll-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 6px; margin-top: 15px; }
    .roll-box { background: #333; color: #888; text-align: center; padding: 8px 0; border-radius: 4px; font-size: 13px; font-weight: bold; border: 1px solid #444; }
    .roll-box.active { background: #27ae60; color: white; border-color: #2ecc71; box-shadow: 0 0 10px rgba(46, 204, 113, 0.4); }
    .roll-box.submitted { background: #3498db; color: white; border-color: #2980b9; }
    
    /* Cheat Feed */
    .cheat-feed { background: #1a0f0f; border: 1px solid #6e2128; height: 350px; overflow-y: auto; border-radius: 8px; padding: 10px; margin-top:15px;}
    .cheat-item { padding: 10px; border-bottom: 1px solid #3d1515; font-size: 13px; color: #fca5a5; }
    .cheat-item span.time { color: #888; font-family: monospace; margin-right: 10px; }
    .cheat-item span.roll { color: #ff5e5e; font-weight: bold; margin-right: 10px; }

    table { width:100%; border-collapse:collapse; margin-top:15px; background:#111; font-size: 14px;}
    th, td { padding:12px; text-align:left; border-bottom:1px solid #222; }
    th { color: #8b949e; }
  </style>
</head>
<body>

<h1>⚗ DSMCH Invigilator Dashboard</h1>
<div class="panel">
    <button class="btn" style="background:#2980b9; color:white;" onclick="setMode('live')">📺 START LECTURE (Slides)</button>
    <button class="btn" style="background:#8e44ad; color:white;" onclick="setMode('testing')">🛠 START FACULTY TESTING</button>
    <button class="btn" style="background:#27ae60; color:white; border: 2px solid white;" onclick="setMode('exam')">📝 START STUDENT EXAM (100 MCQ)</button>
    <button class="btn" style="background:#c0392b; color:white;" onclick="setMode('locked')">🔒 LOCK APP / END EXAM</button>
</div>

<div class="dashboard-grid">
    <div class="panel" style="flex: 2;">
        <h3 style="color:#58a6ff; margin:0;">🟢 Live Roll Call (<span id="online-count">0</span> Active)</h3>
        <div style="font-size:12px; color:#888; margin-top:5px;">
            <span style="color:#888;">Gray = Offline</span> | 
            <span style="color:#27ae60;">Green = Taking Exam</span> | 
            <span style="color:#3498db;">Blue = Submitted</span>
        </div>
        <div id="master-roll-grid" class="roll-grid"></div>
    </div>

    <div class="panel" style="flex: 1; border-color:#6e2128;">
        <h3 style="color:#f78166; margin:0;">🚨 Live Anti-Cheat Alerts</h3>
        <div style="font-size:12px; color:#888; margin-top:5px;">Monitoring tab switches & window focus</div>
        <div id="cheat-feed-container" class="cheat-feed"></div>
    </div>
</div>

<div class="panel" style="margin-top: 20px;">
    <h2 style="color:#27ae60; margin-top:0;">📊 Final Exam Results</h2>
    <button class="btn" style="background:#f39c12; color:black; margin-bottom:10px;" onclick="exportResults()">Download CSV</button>
    <table id="resTable">
        <thead><tr><th>Student/Faculty ID</th><th>Score</th><th>Submitted Time</th></tr></thead>
        <tbody id="resBody"></tbody>
    </table>
</div>

<script>
  // Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyA8IsW3dvtz4oFnGF3NOCHeNVGQsXn6h-c",
    authDomain: "forensic-class-app.firebaseapp.com",
    projectId: "forensic-class-app",
    storageBucket: "forensic-class-app.firebasestorage.app",
    messagingSenderId: "905219571923",
    appId: "1:905219571923:web:f6590bb9b3e36c565c9426"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // 1. Build the 1-250 Grid
  let gridHtml = '';
  for(let i = 1; i <= 250; i++) {
      gridHtml += `<div id="roll-${i}" class="roll-box">${i}</div>`;
  }
  document.getElementById('master-roll-grid').innerHTML = gridHtml;

  // 2. Control App State
  function setMode(m) {
      if(confirm("Change class mode to: " + m.toUpperCase() + "?")) {
          db.collection("slides").doc("current").update({ status: m });
          // If starting exam, clear old presence data for a fresh start
          if(m === 'exam') {
              if(confirm("Do you want to clear the Roll Call grid and Cheat Alerts for this new session?")) {
                  // Note: Deleting collections from client is restricted, but you can visually clear the UI
                  document.getElementById('cheat-feed-container').innerHTML = "";
              }
          }
      }
  }

  // 3. Listen to Live Presence
  db.collection("presence").onSnapshot(snap => {
      let activeCount = 0;
      snap.forEach(doc => {
          const d = doc.data();
          const box = document.getElementById(`roll-${d.roll}`);
          if(box) {
              if(d.status === "Taking Exam") {
                  box.className = "roll-box active";
                  activeCount++;
              } else if (d.status === "Submitted") {
                  box.className = "roll-box submitted";
              }
          }
      });
      document.getElementById('online-count').innerText = activeCount;
  });

  // 4. Listen to Anti-Cheat Alerts
  db.collection("cheat_alerts").orderBy("ts", "desc").limit(50).onSnapshot(snap => {
      let feedHtml = '';
      snap.forEach(doc => {
          const d = doc.data();
          const t = d.ts ? d.ts.toDate().toLocaleTimeString("en-IN") : "Just now";
          feedHtml += `
            <div class="cheat-item">
                <span class="time">[${t}]</span>
                <span class="roll">Roll ${d.roll}</span>
                ${d.name} <br>
                <span style="color:#fff;">${d.event}</span>
            </div>`;
      });
      document.getElementById('cheat-feed-container').innerHTML = feedHtml;
  });

  // 5. Listen to Final Results
  let resultData = [];
  db.collection("exam_results").orderBy("ts", "desc").onSnapshot(snap => {
      let h = '';
      resultData = [];
      snap.forEach(doc => {
          const d = doc.data();
          const t = d.ts ? d.ts.toDate().toLocaleTimeString("en-IN") : "-";
          h += `<tr><td>${d.student}</td><td style="color:#27ae60; font-weight:bold;">${d.score} / 100</td><td>${t}</td></tr>`;
          resultData.push({ student: d.student, score: d.score, time: t });
      });
      document.getElementById('resBody').innerHTML = h;
  });

  // 6. Export Results
  function exportResults() {
      let csv = "data:text/csv;charset=utf-8,Student Identity,Score,Time\n";
      resultData.forEach(r => { csv += `"${r.student}","${r.score}","${r.time}"\n`; });
      const link = document.createElement("a");
      link.href = encodeURI(csv);
      link.download = `Forensic_Exam_Results.csv`;
      link.click();
  }
</script>
</body>
</html>
