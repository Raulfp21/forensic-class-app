<!DOCTYPE html>
<html>
<head>
  <title>Student View</title>

  <!-- Firebase scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

<h1 id="slide">Loading...</h1>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA8IsW3dvtz4oFnGF3NOCHeNVGQsXn6h-c",
    authDomain: "forensic-class-app.firebaseapp.com",
    projectId: "forensic-class-app"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const slideEl = document.getElementById("slide");

  db.collection("slides").doc("current")
    .onSnapshot((doc) => {
      const data = doc.data();
      slideEl.innerText = "Slide " + data.index;
    });
</script>

</body>
</html>
