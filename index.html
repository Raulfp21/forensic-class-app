<!DOCTYPE html>
<html>
<head>
  <title>Student View</title>
</head>
<body>

<h1 id="slide">Loading...</h1>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8IsW3dvtz4oFnGF3NOCHeNVGQsXn6h-c",
  authDomain: "forensic-class-app.firebaseapp.com",
  projectId: "forensic-class-app",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const slideEl = document.getElementById("slide");

const docRef = doc(db, "slides", "current");

onSnapshot(docRef, (docSnap) => {
  const data = docSnap.data();
  slideEl.innerText = "Slide " + data.index;
});
</script>

</body>
</html>
