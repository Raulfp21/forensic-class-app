<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DSMCH Forensic Master Portal</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="config.js"></script>
  <script src="topics.js"></script>
  <style>
    :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --success: #3fb950; --err: #f85149; }
    body { background: var(--bg); color: #c9d1d9; font-family: -apple-system, sans-serif; margin: 0; user-select: none; }
    .container { max-width: 600px; width: 92%; margin: 20px auto; padding: 20px; background: var(--card); border-radius: 12px; border: 1px solid #30363d; }
    .btn { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
    .chip { padding: 14px; background: #21262d; border-radius: 8px; text-align: center; border: 1px solid transparent; cursor: pointer; margin-bottom: 10px; font-size: 14px; }
    .chip.sel { border-color: var(--accent); background: #1f2937; color: var(--accent); }
    .bottle { height: 160px; width: 90px; border: 2px solid #8b949e; margin: 15px auto; position: relative; overflow: hidden; border-radius: 0 0 10px 10px; }
    .liquid { position: absolute; bottom: 0; width: 100%; background: rgba(88, 166, 255, 0.4); }
    #slides-ui, #relay-ui, #sim-ui, #auth-ui, #res-ui, #gate-ui { display: none; }
    .active { display: block !important; }
    input { width: 94%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; }
  </style>
</head>
<body>
<div id="app" class="container">
    <div id="auth-ui" class="active">
        <h2>DSMCH Forensic Portal</h2>
        <input type="number" id="reg" placeholder="Register Number">
        <input type="text" id="name" placeholder="FULL NAME (ALL CAPS)">
        <button class="btn" onclick="login()">Enter Session</button>
    </div>

    <div id="gate-ui" style="text-align:center; padding:40px 0;"><h1>🛑</h1><h3>Batch Access Denied</h3><p>Session restricted to target batch or faculty testing only.</p></div>

    <div id="slides-ui">
        <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--accent); margin-bottom:10px;"><span id="slide-num"></span><span>ACADEMIC MODE</span></div>
        <h3 id="slide-title" style="margin-top:0;"></h3>
        <div id="slide-content" style="min-height:220px; line-height:1.6;"></div>
        <div style="display:flex; gap:10px;"><button class="btn" style="background:#333; flex:1;" onclick="moveSlide(-1)">◀ Back</button><button class="btn" style="flex:2;" onclick="moveSlide(1)">Next Step ▶</button></div>
    </div>

    <div id="relay-ui">
        <div id="row-selection"><h3 style="color:var(--accent)">Select Row Protocol:</h3><div id="row-btns"></div></div>
        <div id="relay-step" style="display:none; padding:20px; background:#0d1117; border-radius:10px;"><h3 id="st-title" style="color:var(--accent); margin-top:0;"></h3><p id="st-text"></p><button class="btn" onclick="nextRelay()">Continue ▶</button></div>
    </div>

    <div id="sim-ui">
        <div id="sim-start"><h3>Case Data:</h3><p id="case-h" style="padding:15px; border-left:4px solid var(--accent); background:#0d1117;"></p><button class="btn" onclick="goSim()">Start 8-Step Practical</button></div>
        <div id="sim-core" style="display:none;"><div style="font-size:11px; color:#8b949e;" id="step-count">Step 1/8</div><h4 id="instr"></h4><div id="zone" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div><div id="vol-zone" style="display:none; text-align:center;"><div class="bottle"><div id="liq" class="liquid"></div></div><input type="range" style="width:100%" min="0" max="100" value="0" oninput="document.getElementById('liq').style.height=this.value+'%'; curVol=this.value"></div><button class="btn" id="nxt" onclick="procSim()">Confirm Selection ▶</button></div>
    </div>

    <div id="res-ui" style="text-align:center;"><h1 id="score-val" style="font-size:4em; color:var(--success);"></h1><div id="log-feed" style="text-align:left; font-size:13px; background:#0d1117; padding:15px;"></div><button class="btn" onclick="location.reload()">Finish</button></div>
</div>

<script>
  firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
  let uid = "", curS, step = 1, curVol = 0, selRow = "", rIdx = 0, slideIdx = 0;
  let myAns = {org:[], chem:"", trace:[], docs:[], labels:[], sealed:false};

  async function login() {
      const r = document.getElementById('reg').value, n = document.getElementById('name').value.toUpperCase().trim();
      if(studentsAll[r] === n) {
          uid = r; document.getElementById('auth-ui').classList.remove('active');
          db.collection("presence").doc(r).set({ roll:r, name:n, status:"Active", ts:Date.now() });
          db.collection("slides").doc("current").onSnapshot(d => {
              const m = d.data().status;
              // RESTORED: Testing and Batch Logic
              let ok = (m === "testing" && parseInt(r) <= 10) || (m.includes("2024") && r.startsWith("520024")) || (m.includes("2023") && (r.startsWith("520023") || r.startsWith("520022")));
              
              if (!ok && !["idle","locked"].includes(m)) {
                  ['auth-ui','relay-ui','sim-ui','slides-ui'].forEach(id=>document.getElementById(id).classList.remove('active'));
                  document.getElementById('gate-ui').classList.add('active');
              } else {
                  document.getElementById('gate-ui').classList.remove('active');
                  document.getElementById('slides-ui').classList.toggle('active', m.includes('slides') || m === "testing");
                  document.getElementById('relay-ui').classList.toggle('active', m.includes('relay'));
                  document.getElementById('sim-ui').classList.toggle('active', m.includes('exam'));
                  if(m.includes('slides') || m === "testing") renderSlide(); else if(m.includes('relay')) initRows(); else if(m.includes('exam')) initSim();
              }
          });
      } else alert("Registry Mismatch");
  }

  function moveSlide(dir) { const n = slideIdx + dir; if(n >= 0 && n < forensicContent.slides.length) { slideIdx = n; renderSlide(); } }
  function renderSlide() {
      const s = forensicContent.slides[slideIdx]; const c = document.getElementById('slide-content');
      document.getElementById('slide-num').innerText = `STEP ${s.id} OF 7`; document.getElementById('slide-title').innerText = s.title;
      if(s.type === "poll") { c.innerHTML = `<p>${s.question}</p>` + s.options.map((o,i)=>`<div class="chip" onclick="submitPoll(${i})">${o}</div>`).join(''); }
      else { c.innerHTML = `<p>${s.text}</p>`; }
      db.collection("presence").doc(uid).update({ status: `Slide ${s.id}` });
  }
  function submitPoll(idx) { const s = forensicContent.slides[slideIdx]; if(idx === s.correct) { document.getElementById('slide-content').innerHTML = `<h3 style="color:var(--success)">✅ Correct</h3><p>${s.reveal}</p>`; db.collection("presence").doc(uid).update({ status: `Poll Passed` }); } else alert("Review Protocol."); }
  function initRows() { let h = ''; Object.keys(forensicContent.relay).forEach(r => h+=`<div class="chip" onclick="startR('${r}')">${r}</div>`); document.getElementById('row-btns').innerHTML = h; }
  function startR(r) { selRow = r; rIdx = 0; document.getElementById('row-selection').style.display='none'; document.getElementById('relay-step').style.display='block'; showR(); }
  function showR() { const d = forensicContent.relay[selRow][rIdx]; document.getElementById('st-title').innerText = d.title; document.getElementById('st-text').innerHTML = d.text; db.collection("presence").doc(uid).update({ status: `Relay: ${selRow} ${rIdx+1}` }); }
  function nextRelay() { if(rIdx < 3) { rIdx++; showR(); } else alert("Completed."); }
  function initSim() { curS = forensicContent.scenarios[Math.floor(Math.random()*forensicContent.scenarios.length)]; document.getElementById('case-h').innerText = curS.history; }
  function goSim() { document.getElementById('sim-start').style.display='none'; document.getElementById('sim-core').style.display='block'; rendSim(); }
  function rendSim() {
      const z = document.getElementById('zone'), vz = document.getElementById('vol-zone'); z.innerHTML = ''; vz.style.display = 'none'; z.style.display = 'grid'; document.getElementById('step-count').innerText = `Practical Step ${step}/8`;
      if(step === 1) { document.getElementById('instr').innerText = "1. Collect Viscera:"; ["Stomach + Contents","Intestine","500g Liver","Half Kidney","Heart","Lungs"].forEach(i => z.innerHTML+=`<div class="chip" onclick="this.classList.toggle('sel')">${i}</div>`); }
      else if(step === 2) { document.getElementById('instr').innerText = "2. Preservative?"; ["Saturated Salt Solution","Rectified Spirit"].forEach(i => z.innerHTML+=`<div class="chip" onclick="myAns.chem='${i}'; procSim()">${i}</div>`); }
      else if(step === 3) { document.getElementById('instr').innerText = "3. Trace Evidence?"; ["Femur (DNA) in Salt","Blood Gauze (Air-dry)","Nitric Acid Swabs","None"].forEach(i => z.innerHTML+=`<div class="chip" onclick="this.classList.toggle('sel')">${i}</div>`); }
      else if(step === 4) { document.getElementById('instr').innerText = "4. Control Sample?"; z.innerHTML = `<button class="btn" onclick="myAns.ctrl=true; procSim()">Yes</button><button class="btn" style="background:#333" onclick="myAns.ctrl=false; procSim()">No</button>`; }
      else if(step === 5) { document.getElementById('instr').innerText = "5. Fill to 3/4th:"; z.style.display='none'; vz.style.display='block'; }
      else if(step === 6) { document.getElementById('instr').innerText = "6. Label Details:"; ["Date/Time","Name/Age/Sex","PM No/Crime No","Preservative"].forEach(i => z.innerHTML+=`<div class="chip" onclick="this.classList.toggle('sel')">${i}</div>`); }
      else if(step === 7) { document.getElementById('instr').innerText = "7. Wax Seal:"; z.innerHTML = `<div style="font-size:40px; cursor:pointer;" onclick="myAns.sealed=true; procSim()">🕯️ Tap to Seal</div>`; }
      else if(step === 8) { document.getElementById('instr').innerText = "8. Dispatch Docs:"; ["Medl. I-30 Form","FIR Copy","Inquest Copy","Magistrate Auth","SOC Sketch"].forEach(i => z.innerHTML+=`<div class="chip" onclick="this.classList.toggle('sel')">${i}</div>`); }
  }
  function procSim() { if([1,3,6,8].includes(step)) { const sel = Array.from(document.querySelectorAll('.sel')).map(e => e.innerText); if(step === 1) myAns.org = sel; if(step === 3) myAns.trace = sel; if(step === 6) myAns.labels = sel; if(step === 8) { myAns.docs = sel; finish(); return; } } step++; rendSim(); }
  async function finish() {
      let s = 0, l = [];
      if(myAns.org.includes("Stomach + Contents") && myAns.org.includes("500g Liver")) { s++; l.push("✅ Viscera: Correct."); } else l.push("❌ Viscera: Incomplete.");
      if(myAns.chem === curS.correctPreservative) { s++; l.push("✅ Chem: Correct."); } else l.push("❌ Chem: Protocol error.");
      if(curVol >= 70 && curVol <= 80) s++; else l.push("❌ Volume: 3/4th rule violated.");
      if(myAns.sealed) s++; else l.push("❌ Seal: Missing wax.");
      if(myAns.docs.includes("Medl. I-30 Form")) s++; else l.push("❌ Dispatch: Missing I-30.");
      await db.collection("simulation_scores").add({ student:uid, scenario:curS.id, score:s, log:l, ts:Date.now() });
      document.getElementById('sim-ui').style.display='none'; document.getElementById('res-ui').classList.add('active');
      document.getElementById('score-val').innerText = s + "/5"; document.getElementById('log-feed').innerHTML = l.join("<br>");
  }
</script>
</body>
</html>
