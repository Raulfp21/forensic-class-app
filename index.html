<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DSMCH Forensic Portal</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="config.js"></script>
  <script src="topics.js"></script>
  <style>
    :root { --bg:#0d1117; --card:#161b22; --accent:#58a6ff; --success:#3fb950; --err:#f85149; }
    body { background:var(--bg); color:#c9d1d9; font-family:-apple-system,sans-serif; margin:0; }
    .container { max-width:600px; margin:20px auto; padding:20px; background:var(--card); border-radius:12px; border:1px solid #30363d; }
    .btn { background:var(--accent); color:white; border:none; padding:15px; border-radius:8px; width:100%; font-weight:bold; cursor:pointer; margin-top:10px; font-size:15px; }
    .btn-out { background:transparent; border:1px solid var(--accent); color:var(--accent); }
    .chip { padding:12px; background:#21262d; border-radius:6px; text-align:center; border:1px solid transparent; cursor:pointer; margin-bottom:8px; font-size:14px; }
    .chip.sel { border-color:var(--accent); background:#1f2937; color:var(--accent); }
    .bottle { height:150px; width:80px; border:2px solid #8b949e; margin:10px auto; position:relative; overflow:hidden; }
    .liquid { position:absolute; bottom:0; width:100%; background:rgba(88,166,255,0.4); transition:height 0.2s; }
    input[type=number], input[type=text] {
      width:94%; padding:12px; margin-bottom:10px;
      background:#0d1117; color:white; border:1px solid #333; border-radius:6px; font-size:16px;
    }
    #relay-ui,#sim-ui,#auth-ui,#res-ui,#locked-ui { display:none; }
    .active { display:block !important; }
    .step-indicator { font-size:12px; color:#58a6ff; margin-bottom:6px; letter-spacing:0.05em; }
    .back-btn { background:#30363d; color:#c9d1d9; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-size:13px; margin-bottom:12px; }
    /* Step content */
    #st-text { line-height:1.7; color:#c9d1d9; }
    #st-text b { color:#e6edf3; }
    #st-text hr { border-color:#30363d; margin:14px 0; }
    /* SVG zoom */
    .svg-zoom-wrap { position:relative; overflow:auto; border:1px solid #30363d; border-radius:8px; background:#0d1117; margin-top:8px; max-height:70vh; }
    .fullscreen-btn { position:sticky; top:8px; float:right; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#c9d1d9; border-radius:6px; padding:4px 10px; font-size:12px; cursor:pointer; z-index:10; margin:8px 8px 0 0; }
    .zoom-hint { font-size:11px; color:#8b949e; text-align:center; padding:4px 0 8px; }
    .svg-zoom-wrap svg { display:block; width:100%; min-width:320px; height:auto; }
  </style>
</head>
<body>
<div id="app" class="container">

  <!-- AUTH -->
  <div id="auth-ui" class="active">
    <h2>DSMCH Forensic Portal</h2>
    <input type="number" id="reg" placeholder="Registration Number">
    <input type="text" id="name" placeholder="Full Name (CAPS)">
    <button class="btn" onclick="login()">Enter Session</button>
  </div>

  <!-- LOCKED -->
  <div id="locked-ui">
    <div style="text-align:center;padding:40px 0;">
      <div style="font-size:48px;">&#128274;</div>
      <h3>Session Locked</h3>
      <p style="color:#8b949e;">Your instructor has paused the session.<br>Please wait.</p>
    </div>
  </div>

  <!-- RELAY UI -->
  <div id="relay-ui">
    <h3 id="row-title" style="margin-bottom:4px;">Topic</h3>
    <p id="topic-label" style="font-size:12px;color:#8b949e;margin-bottom:12px;"></p>
    <div id="row-btns"></div>
    <div id="relay-step" style="display:none;margin-top:16px;padding:15px;background:#0d1117;border-radius:8px;">
      <button class="back-btn" onclick="backToRows()">&#8592; Back</button>
      <div class="step-indicator" id="step-indicator"></div>
      <h4 id="st-title" style="color:var(--accent);margin-bottom:8px;"></h4>
      <div id="st-text"></div>
      <div style="display:flex;gap:8px;margin-top:16px;">
        <button class="btn btn-out" id="prev-btn" onclick="prevRelay()" style="display:none;">&#9664; Prev</button>
        <button class="btn" id="next-btn" onclick="nextRelay()">Next &#9658;</button>
      </div>
    </div>
  </div>

  <!-- SIMULATION UI -->
  <div id="sim-ui">
    <div id="sim-start">
      <h3>Viscera Simulation</h3>
      <p id="case-h" style="padding:15px;border-left:4px solid var(--accent);background:#0d1117;border-radius:4px;line-height:1.6;"></p>
      <button class="btn" onclick="goSim()">Start Practical &#9658;</button>
    </div>
    <div id="sim-core" style="display:none;">
      <div class="step-indicator" id="sim-step-ind"></div>
      <h4 id="instr" style="margin-bottom:12px;"></h4>
      <div id="zone" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"></div>
      <div id="vol-zone" style="display:none;text-align:center;">
        <p style="color:#8b949e;font-size:13px;margin-bottom:8px;">Drag slider to set fill level</p>
        <div class="bottle"><div id="liq" class="liquid" style="height:0%"></div></div>
        <p id="vol-label" style="font-size:13px;color:var(--accent);">0% filled</p>
        <input type="range" min="0" max="100" value="0" style="width:80%;margin-top:8px;"
          oninput="curVol=parseInt(this.value);document.getElementById('liq').style.height=curVol+'%';document.getElementById('vol-label').textContent=curVol+'% filled';">
        <br><button class="btn" onclick="procSim()" style="margin-top:12px;">Confirm Fill &#9658;</button>
      </div>
      <button class="btn" id="nxt" onclick="procSim()" style="margin-top:16px;">Confirm &#9658;</button>
    </div>
  </div>

  <!-- RESULT UI -->
  <div id="res-ui" style="text-align:center;">
    <h1 id="score" style="font-size:48px;margin-bottom:8px;"></h1>
    <p id="score-label" style="color:#8b949e;margin-bottom:20px;"></p>
    <div id="log" style="text-align:left;font-size:14px;line-height:2;background:#0d1117;padding:16px;border-radius:8px;"></div>
    <button class="btn" onclick="location.reload()" style="margin-top:20px;">Finish &amp; Return</button>
  </div>

</div>
<script>
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let uid="",myStream="",myName="";
let curS,step=1,curVol=0,selRow="",rIdx=0;
let myAns={org:[],chem:"",bld:"",vol:0,docs:[],ctrl:false};
let anticheatEnabled=false;
let activeTopic=null;

function showScreen(id){
  ['auth-ui','relay-ui','sim-ui','res-ui','locked-ui'].forEach(s=>{
    const el=document.getElementById(s);
    el.classList.remove('active'); el.style.display='none';
  });
  const el=document.getElementById(id);
  el.style.display='block'; el.classList.add('active');
}

async function login(){
  const r=document.getElementById('reg').value.trim();
  const n=document.getElementById('name').value.toUpperCase().trim();
  if(!r||!n){alert('Please enter both Registration Number and Name.');return;}
  if(studentsAll[r]===n){
    uid=r; myName=n;
    if(r.startsWith('520024')) myStream='2024';
    else if(r.startsWith('520023')) myStream='2023';
    else if(parseInt(r)>=1&&parseInt(r)<=10) myStream='testing';
    else myStream='testing';
    db.collection("presence").doc(r).set({roll:r,name:n,stream:myStream,status:"Active",ts:Date.now()});
    history.pushState({page:'app'},'','');
    anticheatEnabled=true;
    showScreen('locked-ui');
    // ── CORE FIX: listen to stream doc, use activeTopic from broadcast ──
    db.collection("slides").doc(myStream).onSnapshot(d=>{
      if(!d.exists) return;
      const data=d.data();
      activeTopic=data.activeTopic||null;
      const m=data.status;
      if(m==='live'){showScreen('relay-ui');initRows();}
      else if(m==='exam'){showScreen('sim-ui');initSim();}
      else if(m==='locked'||m==='idle'){showScreen('locked-ui');}
    });
  } else {
    alert('\u274C Name or Registration Number mismatch. Check and try again.');
  }
}

// ── RELAY: show ONLY teacher-selected topic ──────────────────
function initRows(){
  const container=document.getElementById('row-btns');
  const label=document.getElementById('topic-label');
  document.getElementById('relay-step').style.display='none';
  container.style.display='block';

  if(activeTopic&&forensicContent.relay[activeTopic]){
    // Teacher selected a specific topic — only show that one
    label.textContent='Instructor assigned topic:';
    const safe=activeTopic.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    container.innerHTML=`<button class="chip" style="width:100%;border-color:var(--accent);background:#1c2333;color:var(--accent);" onclick="startR('${safe}')">${activeTopic}</button>`;
  } else {
    // No specific topic — show all (fallback)
    label.textContent='Select a topic:';
    container.innerHTML=Object.keys(forensicContent.relay).map(r=>{
      const safe=r.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      return `<button class="chip" style="width:100%;" onclick="startR('${safe}')">${r}</button>`;
    }).join('');
  }
}

function startR(r){
  selRow=r; rIdx=0;
  document.getElementById('row-btns').style.display='none';
  document.getElementById('relay-step').style.display='block';
  showR();
}

// ── RENDER STEP: execute inline scripts + SVG zoom ───────────
function showR(){
  const steps=forensicContent.relay[selRow];
  const d=steps[rIdx];
  const total=steps.length;
  document.getElementById('step-indicator').textContent=selRow+' \u00B7 Step '+(rIdx+1)+' of '+total;
  document.getElementById('st-title').textContent=d.title;
  document.getElementById('prev-btn').style.display=rIdx>0?'block':'none';
  document.getElementById('next-btn').textContent=rIdx<total-1?'Next \u25BA':'\u2713 Complete';

  // Wrap SVGs with zoom container
  let html=d.text;
  if(html.includes('<svg')){
    const s=html.indexOf('<svg'), e=html.lastIndexOf('</svg>')+6;
    if(s>-1){
      html=html.substring(0,s)+
        '<div class="svg-zoom-wrap"><button class="fullscreen-btn" onclick="fsSVG()">&#x26F6; Full</button>'+
        '<div id="svgInner">'+html.substring(s,e)+'</div></div>'+
        '<p class="zoom-hint">Scroll inside diagram to pan &middot; Tap Full for fullscreen</p>'+
        html.substring(e);
    }
  }

  const container=document.getElementById('st-text');
  container.innerHTML=html;

  // Execute any inline <script> tags (required for interactive diagrams)
  Array.from(container.querySelectorAll('script')).forEach(old=>{
    const ns=document.createElement('script');
    ns.textContent=old.textContent;
    old.parentNode.replaceChild(ns,old);
  });

  db.collection("presence").doc(uid).update({status:'Relay: '+selRow+' Step '+(rIdx+1)});
}

function fsSVG(){
  const wrap=document.querySelector('.svg-zoom-wrap');
  if(!wrap) return;
  if(!document.fullscreenElement){
    wrap.style.cssText='position:fixed;inset:0;z-index:9999;border-radius:0;overflow:auto;background:#0d1117;max-height:none;';
    wrap.requestFullscreen&&wrap.requestFullscreen();
  } else {
    document.exitFullscreen&&document.exitFullscreen();
  }
}
document.addEventListener('fullscreenchange',()=>{
  if(!document.fullscreenElement){
    const w=document.querySelector('.svg-zoom-wrap');
    if(w) w.style.cssText='';
  }
});

function nextRelay(){
  const steps=forensicContent.relay[selRow];
  if(rIdx<steps.length-1){rIdx++;showR();}
  else{alert('\u2705 Topic complete!');backToRows();}
}
function prevRelay(){if(rIdx>0){rIdx--;showR();}}
function backToRows(){
  document.getElementById('relay-step').style.display='none';
  document.getElementById('row-btns').style.display='block';
  db.collection("presence").doc(uid).update({status:'Active'});
}

// ── SIMULATION ───────────────────────────────────────────────
function initSim(){
  step=1;curVol=0;
  myAns={org:[],chem:"",bld:"",vol:0,docs:[],ctrl:false};
  curS=forensicContent.scenarios[Math.floor(Math.random()*forensicContent.scenarios.length)];
  document.getElementById('case-h').innerText=curS.history;
  document.getElementById('sim-start').style.display='block';
  document.getElementById('sim-core').style.display='none';
}
function goSim(){
  document.getElementById('sim-start').style.display='none';
  document.getElementById('sim-core').style.display='block';
  rendSim();
}
function rendSim(){
  const z=document.getElementById('zone'),inst=document.getElementById('instr'),
        vz=document.getElementById('vol-zone'),nxt=document.getElementById('nxt');
  z.innerHTML='';vz.style.display='none';z.style.display='grid';nxt.style.display='block';
  const sl=['','Select organs & fluids','Select organ preservative','Select blood preservative',
            'Send control sample?','Fill to correct level','Attach FSL documents'];
  document.getElementById('sim-step-ind').textContent='Step '+step+' of 6 \u2014 '+sl[step];
  if(step===1){
    inst.innerText="Select all organs and fluids to preserve:";
    ["Stomach","Intestine","Liver","Kidney","Blood (30ml)","Urine (30ml)","Heart","Brain"]
      .forEach(i=>z.innerHTML+=`<div class="chip" onclick="this.classList.toggle('sel')">${i}</div>`);
  }else if(step===2){
    inst.innerText="Select the organ preservative:";nxt.style.display='none';
    ["Saturated Salt Solution","Rectified Spirit"]
      .forEach(i=>z.innerHTML+=`<div class="chip" onclick="myAns.chem='${i}';procSim()">${i}</div>`);
  }else if(step===3){
    inst.innerText="Select the blood preservative dose:";nxt.style.display='none';
    ["NaF 10mg/mL + K Oxalate 3mg","NaF 2mg/mL + K Oxalate 3mg"]
      .forEach(i=>z.innerHTML+=`<div class="chip" onclick="myAns.bld='${i}';procSim()">${i}</div>`);
  }else if(step===4){
    inst.innerText="Must a control sample be sent to FSL?";nxt.style.display='none';z.style.display='flex';
    z.innerHTML=`<button class="btn" onclick="myAns.ctrl=true;procSim()">Yes</button>
                 <button class="btn btn-out" onclick="myAns.ctrl=false;procSim()">No</button>`;
  }else if(step===5){
    inst.innerText="Fill container to correct level:";
    z.style.display='none';vz.style.display='block';nxt.style.display='none';
    document.getElementById('liq').style.height='0%';
    document.getElementById('vol-label').textContent='0% filled';
  }else if(step===6){
    inst.innerText="Select required documents for FSL dispatch:";
    ["Inquest Report","PM Findings","Magistrate Auth Letter",
     "Viscera Label Medl I-30(a)","FIR Copy","Civil Medical Form Medl I-30"]
      .forEach(i=>z.innerHTML+=`<div class="chip" onclick="this.classList.toggle('sel')">${i}</div>`);
    nxt.textContent='Submit \u2713';
  }
}
function procSim(){
  if(step===1){myAns.org=[];document.querySelectorAll('#zone .sel').forEach(e=>myAns.org.push(e.innerText));}
  if(step===5){myAns.vol=curVol;}
  if(step===6){myAns.docs=[];document.querySelectorAll('#zone .sel').forEach(e=>myAns.docs.push(e.innerText));finish();return;}
  step++;rendSim();
}
async function finish(){
  let s=0,l=[];
  const core=["Stomach","Intestine","Liver","Kidney","Blood (30ml)","Urine (30ml)"];
  if(core.every(c=>myAns.org.includes(c))){s++;l.push("\u2705 Core organs & fluids correct");}
  else l.push("\u274C Organs: Missing one or more core samples");
  if(myAns.chem===curS.correctPreservative){s++;l.push("\u2705 Organ preservative correct");}
  else l.push("\u274C Preservative Error: "+curS.trap);
  const cb=curS.correctBloodPres==="NaF 10mg"?"NaF 10mg/mL + K Oxalate 3mg":"NaF 2mg/mL + K Oxalate 3mg";
  if(myAns.bld===cb){s++;l.push("\u2705 Blood preservative correct");}
  else l.push("\u274C Blood Preservative Error \u2014 check NaF dose");
  if(myAns.ctrl){s++;l.push("\u2705 Control sample included");}
  else l.push("\u274C Missing: Control sample of preservative (25ml)");
  if(myAns.vol>=70&&myAns.vol<=80){s++;l.push("\u2705 Fill level correct (3/4th)");}
  else l.push("\u274C Volume Error \u2014 must be exactly 3/4th");
  if(myAns.docs.includes("Magistrate Auth Letter")){s++;l.push("\u2705 Magistrate Auth Letter included");}
  else l.push("\u274C Missing: Magistrate Auth Letter");
  await db.collection("simulation_scores").add({student:uid,name:myName,stream:myStream,scenario:curS.id,score:s,log:l,ts:Date.now()});
  showScreen('res-ui');
  document.getElementById('score').innerText=s+" / 6";
  document.getElementById('score-label').textContent=s>=5?'\uD83C\uDF89 Excellent!':s>=4?'\uD83D\uDC4D Good effort':'\uD83D\uDCDA Review needed';
  document.getElementById('log').innerHTML=l.join('<br>');
}

// =============================================================
//  ANTI-CHEAT — DO NOT MODIFY
// =============================================================
function logCheatEvent(type,detail){
  if(!uid||!anticheatEnabled) return;
  db.collection("cheat_alerts").add({roll:uid,name:myName,stream:myStream,type:type,detail:detail||'',ts:Date.now()});
  db.collection("presence").doc(uid).update({status:"\u26A0\uFE0F "+type});
}
document.addEventListener("visibilitychange",()=>{
  if(!anticheatEnabled) return;
  if(document.hidden){logCheatEvent("tab_switch","Student switched tab or minimised app");}
  else if(uid) db.collection("presence").doc(uid).update({status:"Active (returned)"});
});
window.addEventListener("beforeunload",(e)=>{
  if(!anticheatEnabled) return;
  logCheatEvent("refresh_attempt","Student attempted page refresh or close");
  e.preventDefault();e.returnValue="\u26A0\uFE0F Leaving will be logged.";return e.returnValue;
});
window.addEventListener("popstate",()=>{
  if(!anticheatEnabled) return;
  logCheatEvent("back_navigation","Student pressed back button");
  history.pushState({page:'app'},'','');
  setTimeout(()=>alert("\u26A0\uFE0F Back navigation not allowed. This has been logged."),100);
});
let tStartX=0;
document.addEventListener("touchstart",e=>{tStartX=e.changedTouches[0].screenX;},{passive:true});
document.addEventListener("touchend",e=>{
  if(!anticheatEnabled) return;
  const dx=e.changedTouches[0].screenX-tStartX;
  if(Math.abs(dx)>60&&(tStartX<40||tStartX>window.innerWidth-40))
    logCheatEvent("swipe_navigation","Edge swipe (dx:"+dx+"px)");
},{passive:true});
// =============================================================
</script>
</body>
</html>
