<!DOCTYPE html>
<html>
<head>
  <title>Student View</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

<h1 id="slide">Starting...</h1>

<script>
  try {

    const firebaseConfig = {
        apiKey: "AIzaSyA8IsW3dvtz4oFnGF3NOCHeNVGQsXn6h-c",
  authDomain: "forensic-class-app.firebaseapp.com",
  projectId: "forensic-class-app",
  storageBucket: "forensic-class-app.firebasestorage.app",
  messagingSenderId: "905219571923",
  appId: "1:905219571923:web:f6590bb9b3e36c565c9426"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const slideEl = document.getElementById("slide");

    const slides = [
  "🧪 Substance that glows in dark and burns in air?",
  "👨‍🔬 1669: Alchemist boiled urine → discovery?",
  "💡 PHOSPHORUS",
  "📍 Why important in Tamil Nadu?",
  "🏭 Sivakasi firecracker industry",
  "⚠️ White phosphorus → highly toxic",
  "🦴 Phossy jaw → mandibular necrosis",
  "🔄 Shift to red phosphorus (safer)",
  "❓ Rat paste ingestion — why dangerous?",
  "⏳ Lucid interval (24–72 hours)",
  "😶 Patient appears normal",
  "🧬 Silent hepatocellular necrosis",
  "⚠️ Sudden liver failure later",
  "👃 Garlic odour (forensic clue)",
  "🧫 Fatty liver on autopsy",
  "🔥 Luminescence in dark",
  "📍 Thandarai case (Tamil Nadu)",
  "⚖️ Homicide + suicide case",
  "📊 Mortality ~70%",
  "🚫 2022 ban in Tamil Nadu",
  "🧠 Clinical pearl: ‘Looks fine’ ≠ safe",
  "🏁 END"
];

    db.collection("slides").doc("current")
      .onSnapshot((doc) => {

        if (!doc.exists) {
          slideEl.innerText = "No data found";
          return;
        }

        const data = doc.data();
        const index = data.index || 0;

        slideEl.innerText = slides[index] || "End";

      }, (error) => {
        slideEl.innerText = "Firebase Error: " + error.message;
      });

  } catch (err) {
    document.getElementById("slide").innerText = "JS Error: " + err.message;
  }
</script>

</<body style="background:black; color:white; text-align:center; font-family:Arial;">

<h1 id="slide" style="font-size:50px; margin-top:20%;">
</html>
