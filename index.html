<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DSMCH Forensic Master Portal</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="config.js"></script>
  <script src="topics.js"></script>
  <style>
    :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --success: #3fb950; --err: #f85149; }
    body { background: var(--bg); color: #c9d1d9; font-family: -apple-system, sans-serif; margin: 0; user-select: none; }
    .container { max-width: 600px; margin: 20px auto; padding: 20px; background: var(--card); border-radius: 12px; border: 1px solid #30363d; }
    .btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .btn-out { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
    .chip { padding: 12px; background: #21262d; border-radius: 6px; text-align: center; border: 1px solid transparent; cursor: pointer; margin-bottom: 8px; }
    .chip.sel { border-color: var(--accent); background: #1f2937; color: var(--accent); }
    .bottle { height: 150px; width: 80px; border: 2px solid #8b949e; margin: 10px auto; position: relative; overflow: hidden; }
    .liquid { position: absolute; bottom: 0; width: 100%; background: rgba(88, 166, 255, 0.4); }
    #relay-ui, #sim-ui, #auth-ui, #res-ui { display: none; }
    .active { display: block !important; }
  </style>
</head>
<body>
<div id="app" class="container">
    <div id="auth-ui" class="active">
        <h2>DSMCH Forensic Portal</h2>
        <input type="number" id="reg" placeholder="Reg No" style="width:94%; padding:12px; margin-bottom:10px; background:#0d1117; color:white; border:1px solid #333;">
        <input type="text" id="name" placeholder="Name (CAPS)" style="width:94%; padding:12px; margin-bottom:15px; background:#0d1117; color:white; border:1px solid #333;">
        <button class="btn" onclick="login()">Enter Session</button>
    </div>

    <div id="relay-ui">
        <h3 id="row-title">Select Row Protocol</h3>
        <div id="row-btns"></div>
        <div id="relay-step" style="display:none; margin-top:20px; padding:15px; background:#0d1117; border-radius:8px;">
            <h4 id="st-title" style="color:var(--accent);"></h4>
            <p id="st-text"></p>
            <button class="btn" onclick="nextRelay()">Next Step ▶</button>
        </div>
    </div>

    <div id="sim-ui">
        <div id="sim-start">
            <p id="case-h" style="padding:15px; border-left:4px solid var(--accent); background:#0d1117;"></p>
            <button class="btn" onclick="goSim()">Start Practical</button>
        </div>
        <div id="sim-core" style="display:none;">
            <h4 id="instr"></h4>
            <div id="zone" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;"></div>
            <div id="vol-zone" style="display:none; text-align:center;">
                <div class="bottle"><div id="liq" class="liquid"></div></div>
                <input type="range" style="width:100%" oninput="document.getElementById('liq').style.height=this.value+'%'; curVol=this.value">
            </div>
            <button class="btn" id="nxt" onclick="procSim()">Confirm ▶</button>
        </div>
    </div>

    <div id="res-ui" style="text-align:center;">
        <h1 id="score"></h1>
        <div id="log" style="text-align:left; font-size:13px; line-height:1.6;"></div>
        <button class="btn" onclick="location.reload()">Finish</button>
    </div>
</div>

<script>
  firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
  let uid = "", curS, step = 1, curVol = 0, selRow = "", rIdx = 0, myAns = {org:[], chem:"", bld:"", vol:0, docs:[], ctrl:false};
  // Add this logic inside your index.html Firebase Listener
db.collection("slides").doc("current").onSnapshot(d => {
    const m = d.data().status;
    const reg = uid; // The logged-in ID

    let isAllowed = false;

    if (m === "idle" || m === "locked") {
        isAllowed = false;
    } else if (m === "testing") {
        // Faculty Gate: Only allow IDs 1-10
        if (parseInt(reg) >= 1 && parseInt(reg) <= 10) isAllowed = true;
    } else if (m.includes("2024")) {
        // 2024 Gate: Only allow IDs starting with 520024
        if (reg.startsWith("520024")) isAllowed = true;
    } else if (m.includes("2023")) {
        // 2023 Gate: Allow 520023, 520022 and the odd 5218 ID
        if (reg.startsWith("520023") || reg.startsWith("520022") || reg === "521823525") isAllowed = true;
    }

    if (!isAllowed && m !== "idle" && m !== "locked") {
        alert("ACCESS DENIED: This session is currently active for another batch only.");
        document.getElementById('relay-ui').classList.remove('active');
        document.getElementById('sim-ui').classList.remove('active');
    } else {
        // Show correct UI based on mode
        document.getElementById('relay-ui').classList.toggle('active', m.includes('relay'));
        document.getElementById('sim-ui').classList.toggle('active', m.includes('exam') || m === 'testing');
        
        if (m.includes('relay')) initRows(); 
        else if (m.includes('exam') || m === 'testing') initSim();
    }
});

  async function login() {
      const r = document.getElementById('reg').value, n = document.getElementById('name').value.toUpperCase().trim();
      if(studentsAll[r] === n) {
          uid = r; document.getElementById('auth-ui').classList.remove('active');
          db.collection("presence").doc(r).set({ roll:r, name:n, status:"Active", ts:Date.now() });
          db.collection("slides").doc("current").onSnapshot(d => {
              const m = d.data().status;
              document.getElementById('relay-ui').classList.toggle('active', m === "live");
              document.getElementById('sim-ui').classList.toggle('active', m === "exam");
              if(m === "live") initRows(); else if(m === "exam") initSim();
          });
      } else alert("Mismatch");
  }

  function initRows() {
      let h = ''; Object.keys(forensicContent.relay).forEach(r => h+=`<button class="chip" style="width:100%" onclick="startR('${r}')">${r}</button>`);
      document.getElementById('row-btns').innerHTML = h;
  }

  function startR(r) {
      selRow = r; rIdx = 0; document.getElementById('row-btns').style.display = 'none';
      document.getElementById('relay-step').style.display = 'block'; showR();
  }

  function showR() {
      const d = forensicContent.relay[selRow][rIdx];
      document.getElementById('st-title').innerText = d.title;
      document.getElementById('st-text').innerHTML = d.text;
      db.collection("presence").doc(uid).update({ status: `Relay: ${selRow} ${rIdx+1}` });
  }

  function nextRelay() { if(rIdx < 3) { rIdx++; showR(); } else alert("Row Complete!"); }

  function initSim() {
      curS = forensicContent.scenarios[Math.floor(Math.random()*forensicContent.scenarios.length)];
      document.getElementById('case-h').innerText = curS.history;
  }

  function goSim() { document.getElementById('sim-start').style.display = 'none'; document.getElementById('sim-core').style.display = 'block'; rendSim(); }

  function rendSim() {
      const z = document.getElementById('zone'), inst = document.getElementById('instr'), vz = document.getElementById('vol-zone');
      z.innerHTML = ''; vz.style.display = 'none'; z.style.display = 'grid';
      if(step === 1) { inst.innerText = "Select Organs & 30ml Fluids:"; ["Stomach","Intestine","Liver","Kidney","Blood (30ml)","Urine (30ml)","Heart","Brain"].forEach(i => z.innerHTML+=`<div class="chip" onclick="this.classList.toggle('sel')">${i}</div>`); }
      else if(step === 2) { inst.innerText = "Organ Preservative?"; ["Saturated Salt Solution","Rectified Spirit"].forEach(i => z.innerHTML+=`<div class="chip" onclick="myAns.chem='${i}'; procSim()">${i}</div>`); }
      else if(step === 3) { inst.innerText = "Blood Preservative?"; ["NaF 10mg","NaF 2mg"].forEach(i => z.innerHTML+=`<div class="chip" onclick="myAns.bld='${i}'; procSim()">${i}</div>`); }
      else if(step === 4) { inst.innerText = "Send Control Sample?"; z.innerHTML = `<button class="btn" onclick="myAns.ctrl=true; procSim()">Yes</button><button class="btn" onclick="myAns.ctrl=false; procSim()">No</button>`; }
      else if(step === 5) { inst.innerText = "Fill to 3/4th:"; z.style.display='none'; vz.style.display='block'; }
      else if(step === 6) { inst.innerText = "Attach Magistrate Docs:"; ["Inquest Report","PM Findings","Magistrate Auth","Seal Sheet","FIR"].forEach(i => z.innerHTML+=`<div class="chip" onclick="this.classList.toggle('sel')">${i}</div>`); }
  }

  function procSim() {
      if(step === 1) document.querySelectorAll('.sel').forEach(e => myAns.org.push(e.innerText));
      if(step === 6) { document.querySelectorAll('.sel').forEach(e => myAns.docs.push(e.innerText)); finish(); return; }
      step++; rendSim();
  }

  async function finish() {
      let s = 0, l = [];
      if(myAns.org.includes("Blood (30ml)") && myAns.org.includes("Urine (30ml)")) { s++; l.push("✅ Fluids Correct"); } else l.push("❌ Missing 30ml Fluids");
      if(myAns.chem === curS.correctPreservative) { s++; l.push("✅ Organ Chem Correct"); } else l.push("❌ Chemical Error: " + curS.trap);
      if(myAns.bld === curS.correctBloodPres) s++; else l.push("❌ Blood Chem Error");
      if(myAns.ctrl) s++; else l.push("❌ Missing Control Sample");
      if(curVol >= 70 && curVol <= 80) s++; else l.push("❌ Volume Error (Not 3/4th)");
      if(myAns.docs.includes("Magistrate Auth")) s++; else l.push("❌ Missing Magistrate Auth");

      await db.collection("simulation_scores").add({ student:uid, scenario:curS.id, score:s, log:l, ts:Date.now() });
      document.getElementById('sim-ui').style.display='none'; document.getElementById('res-ui').classList.add('active');
      document.getElementById('score').innerText = s + "/6"; document.getElementById('log').innerHTML = l.join("<br>");
  }

  document.addEventListener("visibilitychange", () => { if(document.hidden && uid) db.collection("cheat_alerts").add({ roll:uid, ts:Date.now() }); });
</script>
</body>
</html>
