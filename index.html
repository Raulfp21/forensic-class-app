    let savedReg = localStorage.getItem("dsmch_reg");

    while (true) {

      input = input.trim();
      
      if (input === "000000000000") {

          localStorage.setItem("dsmch_reg", "FACULTY");

          return final; 
      }

            let finalIdentity = input + " - " + nameInput;

              } else { 
                  if (!doc.exists) await bRef.set({ deviceId: deviceId, name: finalIdentity, ts: firebase.firestore.FieldValue.serverTimestamp() }); 
                  localStorage.setItem("dsmch_reg", input);
                  localStorage.setItem("dsmch_name", finalIdentity); 
                  return finalIdentity; 
              }
            } catch(e) { return "TESTER"; }

  async function initApp() {
      studentName = await authenticateStudent();
      applyWatermark(studentName);

      db.collection("slides").doc("current").onSnapshot((doc) => {
        if (!doc.exists) { slideEl.innerHTML = "No data found"; return; }
        const data = doc.data();
        if (data.status === "locked") {
          slideEl.innerHTML = `<div style="text-align:center; padding:40px;"><div style="font-size:50px; margin-bottom:20px;">🔒</div><h2 style="color:#f78166;">Session Ended</h2><p style="color:#8b949e;">Materials are locked by the instructor.</p></div>`;
          return; 
        }
        const topic = data.topic || "phosphorus"; 
        const index = Number(data.index) || 0;
        const slideData = allTopics[topic] ? allTopics[topic][index] : null;

        if (!slideData) slideEl.innerHTML = "<div style='text-align:center;padding:40px;color:#8b949e;font-size:24px;'>End of Lecture</div>";
        else slideEl.innerHTML = slideData.render(); 
      });
  }
  initApp();
