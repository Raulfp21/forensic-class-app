    .quiz-feedback { margin-top: 10px; padding: 10px 14px; border-radius: 8px; font-size: 14px; display: none; line-height: 1.5; }

    .tl-left { display: flex; flex-direction: column; align-items: center; min-width: 36px; }

  async function authenticateStudent() {
    let savedReg = localStorage.getItem("dsmch_reg");
    let savedName = localStorage.getItem("dsmch_name");

    if (!savedReg) {
      let auth = false;
      while (!auth) {
        let input = prompt("Enter 12-digit Register No (2023 Batch)\nOR Exact Name (2024 Batch):");
        if (!input) continue;
        input = input.trim().toUpperCase();
        
        // SECRET FACULTY BYPASS
        if (input === "000000000000") {
            let facName = prompt("Faculty Login: Enter Name");
            localStorage.setItem("dsmch_reg", "FACULTY");
            localStorage.setItem("dsmch_name", facName || "TESTER");
            return "FACULTY - " + (facName || "TESTER");
        }

        let finalIdentity = "";
        let dbKey = "";

        // 2023 Batch Check
        if (students2023[input]) {
            let nameInput = prompt("Enter Name (EXACTLY as per college records):").toUpperCase().trim();
            if (students2023[input] === nameInput) {
                finalIdentity = input + " - " + nameInput;
                dbKey = input;
            } else {
                alert("❌ Name does not match the Register Number.");
                continue;
            }
        } 
        // 2024 Batch Check
        else if (students2024.includes(input)) {
            finalIdentity = input;
            dbKey = input;
        } 
        else {
            alert("❌ INVALID: Identity not found in records.");
            continue;
        }

        // --- FIRESTORE DEVICE BINDING CHECK ---
        const bindingRef = db.collection("device_bindings").doc(dbKey);
        const doc = await bindingRef.get();

        if (doc.exists && doc.data().deviceId !== deviceId) {
            alert("❌ ACCESS DENIED: This Identity is already bound to a different device.");
        } else {
            if (!doc.exists) {
                await bindingRef.set({ deviceId: deviceId, name: finalIdentity, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            }
            localStorage.setItem("dsmch_reg", dbKey);
            localStorage.setItem("dsmch_name", finalIdentity);
            return finalIdentity;
        }
      }
    }
    return savedName; // If they already logged in before
  }
