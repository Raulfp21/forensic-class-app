<!DOCTYPE html>
<html lang="en">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSMCH Forensic - Classroom & Assessment</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background:#0f172a; color:white; overflow-x: hidden; -webkit-user-select: none; user-select: none; }
    .container { max-width:850px; width:95%; margin: 20px auto; background:#1e293b; padding:25px; border-radius:15px; border: 1px solid #334155; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
    h2 { color: #58a6ff; text-align: center; margin-top:0; }
    input { width:100%; padding:14px; margin:10px 0; border-radius:8px; border:1px solid #334155; background:#0f172a; color:white; box-sizing:border-box; font-size:16px;}
    .btn { background:#3498db; color:white; border:none; padding:15px; border-radius:8px; cursor:pointer; font-weight:bold; width:100%; font-size:16px; margin-top:10px;}
    .timer-bar { background:#e74c3c; padding:12px; border-radius:8px; text-align:center; font-weight:bold; margin-bottom:15px; font-size:1.1em;}
    .option-label { display:block; padding:16px; margin:10px 0; background:#334155; border-radius:8px; cursor:pointer; border:1px solid transparent; transition:0.2s;}
    .option-label:hover { border-color:#58a6ff; background:#24334d;}
    .q-box { padding:12px 0; text-align:center; border-radius:6px; cursor:pointer; font-weight:bold; background:#475569; font-size:14px;}
    .q-box.answered { background:#27ae60;}
    .q-box.flagged { background:#e67e22; border:2px solid white;}
    .review-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap:8px; margin-top:20px;}
    #lightbox { display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(15,23,42,0.95); z-index:9999; flex-direction:column; align-items:center; justify-content:center; }
    #lecture-ui, #exam-ui, #review-ui, #result-ui, #auth-ui { display:none; }
    .slide-title { font-size: 24px; font-weight: bold; color: #58a6ff; margin-bottom: 10px; line-height: 1.2; }
    .slide-subtitle { font-size: 14px; color: #7d8590; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
    .alert-box { padding: 12px; border-radius: 8px; margin: 10px 0; border: 1px solid #333; font-size: 15px; line-height: 1.5; }
    .alert-yellow { background: #2b2008; color: #ffa657; border-color: #6e4c0a; }
    .alert-red { background: #2d1215; color: #f78166; border-color: #6e2128; }
    .alert-green { background: #0d2a1a; color: #7ee787; border-color: #1a4426; }
    .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    .stat-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; justify-content:center;}
    .stat-pill { background: #21262d; border: 1px solid #30363d; border-radius: 8px; padding: 10px 15px; text-align: center; }
    .stat-pill .sv { font-size: 20px; font-weight: 700; }
    .stat-pill .sl { font-size: 11px; color: #7d8590; margin-top: 2px; text-transform: uppercase;}
    .burn-zone { width:120px; height:120px; background:#1e293b; border-radius:50%; margin:10px auto; display:flex; align-items:center; justify-content:center; transition:0.4s; cursor:pointer; border: 4px solid #334155; font-weight: bold; font-size: 16px; }
    .diag-card { background:#21262d; border:1px solid #30363d; padding:12px; border-radius:10px; margin:8px 0; cursor:pointer; text-align: left; transition: 0.2s; font-size: 15px; color: white; line-height: 1.4;}
    .img-btn { width: 100%; border-radius: 8px; border: 2px solid #1a3a5c; cursor: pointer; transition: 0.3s; margin-top: 10px; object-fit: cover; background: #000;}
    .text-block { background:#1e293b; padding:12px; border-radius:8px; margin-bottom:10px; font-size: 14px; line-height: 1.5; color: #c9d1d9;}
    .sort-item { background: #30363d; padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; cursor: pointer; margin-bottom: 5px; border: 1px solid #555; transition: 0.2s;}
    .sort-zone { min-height: 80px; border: 2px dashed #555; border-radius: 8px; padding: 10px; margin-top: 10px; text-align: center; }
    @keyframes neonPulse { 0% { box-shadow: 0 0 5px #7ee787; border-color: #7ee787; color: #e6edf3; } 100% { box-shadow: 0 0 20px #00ff88; border-color: #00ff88; color: #00ff88; } }
    .diagnostic-glow { animation: neonPulse 1.5s infinite alternate; padding:10px; border-radius:8px; border: 1px solid; margin: 10px 0; font-weight: bold; background: #0d2a1a;}
  </style>
</head>

<div id="lightbox">
    <button onclick="document.getElementById('lightbox').style.display='none'" style="position:absolute; top:20px; right:20px; background:#f78166; color:white; border:none; padding:10px 20px; border-radius:8px; font-size:16px; font-weight:bold; cursor:pointer; z-index:10001;">❌ CLOSE</button>

    </div>

</div>

<div id="app" class="container">
    <div id="auth-ui">
        <h2>DSMCH Forensic Portal</h2>
        <div id="status-tag" style="text-align:center; padding:5px; border-radius:4px; font-size:12px; margin-bottom:15px; background:#334155;">Connecting...</div>
        
        <div id="student-form" style="display:none;">
            <input type="number" id="roll-in" placeholder="Roll Number (1-250)">
            <input type="text" id="name-in" placeholder="Full Name (Exactly as records)">
            <button class="btn" onclick="tryStudentLogin()">Enter Class/Exam</button>
        </div>

        <div id="faculty-form" style="display:none;">
            <p style="text-align:center; color:#ffa657;">Testing Mode Active: Faculty Credentials Required</p>
            <input type="password" id="fac-pass" placeholder="Faculty Test Password">
            <button class="btn" style="background:#8e44ad;" onclick="tryFacultyLogin()">Start Faculty Test</button>
        </div>
    </div>

    <div id="lecture-ui">
        <div id="slide-display"></div>
    </div>

    <div id="exam-ui">
        <div class="timer-bar" id="t-clock">Time Remaining: 60s</div>
        <div id="q-header" style="color:#8b949e; margin-bottom:10px;">Question 1 / 100</div>
        <div id="q-content" style="font-size:1.2em; margin-bottom:20px; line-height:1.4;"></div>
        <div id="opt-container"></div>
        <div style="display:flex; justify-content:space-between; margin-top:25px;">
            <label style="color:#e67e22; cursor:pointer;"><input type="checkbox" id="f-check"> Mark for Review</label>
            <button onclick="saveAndNext()" style="background:#58a6ff; color:white; border:none; padding:10px 25px; border-radius:6px; font-weight:bold; cursor:pointer;">Next Question</button>
        </div>
    </div>

    <div id="review-ui">
        <h2>Review Period</h2>
        <div class="timer-bar" id="r-clock" style="background:#8e44ad;">Grace Period: 05:00</div>
        <div id="grid-wrap" class="review-grid"></div>
        <button class="btn" style="background:#27ae60; margin-top:30px;" onclick="finalSubmission()">Submit My Answers</button>
    </div>

    <div id="result-ui" style="text-align:center;">

        <h1 id="s-total" style="font-size:4.5em; color:#27ae60; margin:10px 0;"></h1>
