<!DOCTYPE html>
<html>
<head>
  <title>Student View</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

<h1 id="slide">Loading...</h1>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA8IsW3dvtz4oFnGF3NOCHeNVGQsXn6h-c",
  authDomain: "forensic-class-app.firebaseapp.com",
  projectId: "forensic-class-app",
  storageBucket: "forensic-class-app.firebasestorage.app",
  messagingSenderId: "905219571923",
  appId: "1:905219571923:web:f6590bb9b3e36c565c9426"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const slideEl = document.getElementById("slide");

  db.collection("slides").doc("current")
    .onSnapshot((doc) => {
      if (doc.exists) {
        const data = doc.data();
        const slides = [
  "🧪 Substance that glows in dark and burns in air?",
  "👨‍🔬 1669: Alchemist boiled urine → discovery?",
  "💡 Phosphorus",
  "📍 Why important in Tamil Nadu?",
  "🏭 Sivakasi industry",
  "⚠️ White phosphorus → toxic",
  "🦴 Phossy jaw (mandibular necrosis)",
  "🔄 Shift to red phosphorus",
  "❓ Rat paste ingestion—why dangerous?",
  "⏳ Lucid interval (24–72 hrs)",
  "🧬 Silent hepatic necrosis",
  "⚠️ Sudden liver failure",
  "👃 Garlic odour (forensic clue)",
  "🧫 Fatty liver on autopsy",
  "🔥 Luminescence in dark",
  "📍 Thandarai case (TN)",
  "⚖️ Homicide + suicide case",
  "📊 Mortality ~70%",
  "🚫 2022 ban in Tamil Nadu",
  "🧠 Clinical pearl: Patient may look normal initially",
  "🏁 END"
];

slideEl.innerText = slides[data.index] || "End";
      } else {
        slideEl.innerText = "No data found";
      }
    }, (error) => {
      slideEl.innerText = "Error: " + error.message;
    });
</script>

</body>
</html>
