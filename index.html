<!DOCTYPE html>
<html>
<head>
  <title>Student View - Live Class</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <style>
    body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background:#0f172a; color:white; }
    .slide-title { font-size: 26px; font-weight: bold; color: #58a6ff; margin-bottom: 15px; }
    .slide-subtitle { font-size: 14px; color: #7d8590; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
    .alert-box { padding: 15px; border-radius: 8px; margin: 10px 0; border: 1px solid #333; font-size: 20px; line-height: 1.5; }
    .alert-yellow { background: #2b2008; color: #ffa657; border-color: #6e4c0a; }
    .alert-red { background: #2d1215; color: #f78166; border-color: #6e2128; }
    .alert-green { background: #0d2a1a; color: #7ee787; border-color: #1a4426; }
    .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
    .compare-card { background: #21262d; padding: 15px; border-radius: 8px; border: 1px solid #30363d; font-size: 18px;}
    .compare-card.danger { background: #2d1215; border-color: #6e2128; }
    .compare-card.safe-card { background: #0d2a1a; border-color: #1a4426; }
    .compare-card h3 { margin-top: 0; color: #7ee787; }
    .stat-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; }
    .stat-pill { background: #21262d; border: 1px solid #30363d; border-radius: 10px; padding: 10px 18px; text-align: center; }
    .stat-pill .sv { font-size: 28px; font-weight: 700; }
    .stat-pill .sl { font-size: 11px; color: #7d8590; margin-top: 2px; }
  </style>
</head>

<body>

<div style="display:flex; justify-content:center; align-items:center; height:100vh; padding:20px;">
  <div style="max-width:800px; width:100%; background:#1e293b; padding:30px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.5);">
    <div id="slide" style="font-size:26px; line-height:1.6; white-space:pre-wrap; margin:0;">
      Loading...
    </div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA8IsW3dvtz4oFnGF3NOCHeNVGQsXn6h-c",
    authDomain: "forensic-class-app.firebaseapp.com",
    projectId: "forensic-class-app",
    storageBucket: "forensic-class-app.firebasestorage.app",
    messagingSenderId: "905219571923",
    appId: "1:905219571923:web:f6590bb9b3e36c565c9426"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  
  const slideEl = document.getElementById("slide");
  const studentName = prompt("Please enter your name for attendance:") || "Anonymous";

  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === 'hidden') {
      db.collection("activity_logs").add({ student: studentName, event: "Left Page / Switched Tab", timestamp: firebase.firestore.FieldValue.serverTimestamp(), slideContext: slideEl.innerText.substring(0, 40) });
    } else {
      db.collection("activity_logs").add({ student: studentName, event: "Returned to Page", timestamp: firebase.firestore.FieldValue.serverTimestamp(), slideContext: slideEl.innerText.substring(0, 40) });
    }
  });

  window.onbeforeunload = function() {
    db.collection("activity_logs").add({ student: studentName, event: "Closed / Left Page", timestamp: firebase.firestore.FieldValue.serverTimestamp(), slideContext: slideEl.innerText.substring(0, 40) });
    return "Are you sure you want to leave the lecture?";
  };

  // ✅ THE DUAL TOPIC LIBRARY
  const allTopics = {
    "fm216": [
      // Slide 1
      { render: () => `

        <div class="stat-row">
          <div class="stat-pill"><div class="sv" style="color:#f78166">10</div><div class="sl">Questions to Answer</div></div>
          <div class="stat-pill"><div class="sv" style="color:#ffa657">95%</div><div class="sl">Pelvis for Sex</div></div>
          <div class="stat-pill"><div class="sv" style="color:#7ee787">Femur</div><div class="sl">Best for Stature</div></div>
        </div>
        <div class="alert-box alert-yellow" style="margin-top:16px"><strong>When identity is destroyed — Science restores it</strong></div>` 
      },
      // Slide 2
      { render: () => `
        <div class="slide-title">📖 Textbook Definitions</div>
        <div class="alert-box" style="background:#0d1a2a;border:1px solid #1a3a5c">
          <strong style="color:#58a6ff">Reddy:</strong><br><span style="color:#c9d1d9">"Mutilated bodies — extensively disfigured, or limb/part lost but <strong>soft tissues still attached to bones</strong>"</span>
        </div>
        <div class="alert-box" style="background:#1a1400;border:1px solid #3a2f00">
          <strong style="color:#ffa657">Modi:</strong><br><span style="color:#c9d1d9">"Mutilation is <strong>NOT always criminal</strong> — animals can mutilate in a very short time"</span>
        </div>`
      },
      // Slide 3
      { render: () => `
        <div class="slide-title">🔍 Preliminary Examination</div>
        <img src="https://i.postimg.cc/mD8gM3X9/Screenshot-20260412-143112-OneDrive.jpg" style="width:100%; border-radius:10px;">
        <br>Record container details (Knot analysis). Detect Anatomy Room artifacts (Formalin/Red Lead).
        <div class="alert-box alert-green"><strong>Precipitin test ⭐</strong> — confirms human protein for isolated soft tissue.</div>`
      },
      // Slide 4
      { render: () => `
        <div class="slide-title">🐾 Animal vs Criminal Dismemberment</div>
        <img src="https://i.postimg.cc/0jXyB6S6/Gemini-Generated-Image-xnmoitxnmoitxnmo.jpg" style="width:100%; border-radius:10px;">
        <div class="compare-grid">
          <div class="compare-card">
            <h3 style="color:#a78bfa">Animal Scavenging</h3>
            Scalloped/Nibbled edges<br>Medulla eaten → cortical bone spicules pushed inward ⭐<br>No vital reaction
          </div>
          <div class="compare-card danger">
            <h3 style="color:#f78166">Criminal</h3>
            Clean-cut or saw marks<br>Precise joint-level separation (Skilled)<br>Evidence of planning
          </div>
        </div>`
      },
      // Slide 5
      { render: () => `
        <div class="slide-title">📏 Stature from Long Bones</div>
        <div class="alert-box alert-yellow"><strong>Karl Pearson Factors:</strong><br>Femur: Length x 3.7<br>Humerus: Length x 5.3</div>
        <div class="alert-box alert-green"><strong>Trotter-Gleser (Male):</strong><br>Stature (cm) = (2.32 × Femur length) + 65.53</div>
        <div class="alert-box" style="background:#1a1a2a; border:1px solid #333;"><strong>Note:</strong> Living height = Skeletal height + 2 to 4 cm (soft tissue correction)</div>`
      }
    ],

    "phosphorus": [
      `💡 PHOSPHORUS IN TAMIL NADU\nHistory + Medicine + Forensics\n👉 Not just a poison\n👉 A complete story`,
      `👨‍🔬 1669 — Henning Brand\nSearching for Philosopher’s Stone\nCollected: ~5000 L urine\n👉 Boiled → paste → heated`,
      `💡 DISCOVERY\nWhite waxy substance\nGlows in dark\nBurns in air\nName: “Phosphorus” = Bearer of Light`,
      `🏭 SIVAKASI CONNECTION\nFirecracker industry\nUsed: White Phosphorus`,
      `⚠️ PHOSSY JAW\nChronic exposure\n👉 Mandibular necrosis\n👉 Bone glows in dark\n📌 Occupational hazard`,
      `🔄 SHIFT TO SAFETY\nWhite P → banned\nRed P used\n✔ Non-toxic\n✔ Stable`,
      `🧪 RAT PASTE ERA (TN)\n3% Yellow Phosphorus\n💰 Cheap (₹10–15)\n🏪 Available everywhere`,
      `⚠️ WHY DANGEROUS?\n❌ No severe pain\n❌ Easy to consume\n👉 Patient underestimates severity`,
      `⏳ LUCID INTERVAL (24–72 hrs)\nPatient feels NORMAL\n🚨 MOST DANGEROUS PHASE\n👉 Intern mistake: Discharge patient`,
      `🧬 REALITY\nDuring this time:\n👉 Liver destruction ongoing\n👉 Silent hepatotoxicity`,
      `⚠️ AFTER 72 HOURS\nFulminant hepatic failure\n• Jaundice • Coagulopathy • Encephalopathy`,
      `💀 PROGNOSIS\nMortality ~70%\n📉 Very high risk`,
      `📍 THANDARAI CASE (2016)\nTiruvannamalai\n6 deaths in 25 days`,
      `😨 INITIAL CONFUSION\nGhost? Infection? Brain fever?`,
      `🔍 FORENSIC CLUE\nGarlic odour\nFatty liver`,
      `⚖️ FINAL DIAGNOSIS\nYellow phosphorus poisoning\n👉 Food contamination (rasam)`,
      `🚫 2022 BAN (TAMIL NADU)\nBased on:\n📊 Mortality ~70%\nStudies by MMC & Stanley`,
      `📌 CURRENT REALITY\nStill seen due to:\n👉 Illegal stock\n👉 Old supply`,
      `⚗️ ALLOTROPES\nWhite → TOXIC\nRed → SAFE\nBlack → Stable (no forensic role)`,
      `🔥 WHITE PHOSPHORUS\n• Glows\n• Ignites at 30°C\n• Lipid soluble\n• Highly toxic`,
      `🩺 STAGE 1 (0–24 hrs)\nGI phase\n• Burning pain • Vomiting • Garlic eructation`,
      `✨ FORENSIC SIGNS\n• Luminescent vomitus\n• Smoking stools\n📌 Rare but exam favourite`,
      `⏳ STAGE 2\nLucid interval\nPatient: “I feel fine”\n🚨 DO NOT TRUST`,
      `🧬 STAGE 3\nHepatic failure\n• Jaundice • Bleeding • Encephalopathy`,
      `🧫 POSTMORTEM — LIVER\nEnlarged\nYellow\nFatty change`,
      `📍 HISTOLOGY\nZone 1 (periportal)\n🔥 HIGH-YIELD POINT`,
      `🫀 HEART\n“Tiger lily heart”\nFatty degeneration`,
      `💊 MANAGEMENT\n1. KMnO₄ lavage (1:5000)\n2. Activated charcoal\n3. NAC`,
      `🚫 AVOID\n❌ Milk\n❌ Oil\n👉 Increases absorption`,
      `📊 MONITOR\n• LFT\n• PT/INR\n👉 Even if asymptomatic`,
      `⚖️ DIFFERENTIAL\nYellow P → Liver failure\nZinc phosphide → Shock + gas toxicity`,
      `👃 ODOUR DIFFERENCE\nYellow P → Garlic\nZinc phosphide → Rotten fish`,
      `🦴 CHRONIC POISONING\nPhossy jaw\n👉 Osteomyelitis\n👉 Non-healing extraction`,
      `⚖️ MEDICOLEGAL\nSuicidal → common\nHomicidal → rare\nAccidental → children`,
      `📜 LAW (BNS)\nSection 123 → Poisoning\nSection 103 → Murder`,
      `🏁 END\n“Lucid interval kills, not the poison immediately”`
    ]
  };

  // ✅ THE LISTENER: Handles both Strings and Objects
  db.collection("slides").doc("current").onSnapshot((doc) => {
    if (!doc.exists) {
      slideEl.innerHTML = "No data found";
      return;
    }

    const data = doc.data();
    const topic = data.topic || "fm216"; 
    const index = Number(data.index) || 0;

    const slideData = allTopics[topic][index];

    if (!slideData) {
      slideEl.innerHTML = "End of Lecture";
    } else if (typeof slideData === "string") {
      slideEl.innerHTML = slideData; // For Phosphorus
    } else {
      slideEl.innerHTML = slideData.render(); // For FM 2.16
    }

  }, (error) => {
    slideEl.innerHTML = "Error: " + error.message;
  });

</script>

</body>
</html>
