<!DOCTYPE html>
<html>
<head>
  <title>DSMCH Live Class</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <style>
    body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background:#0f172a; color:white; }
    .slide-title { font-size: 26px; font-weight: bold; color: #58a6ff; margin-bottom: 15px; }
    .slide-subtitle { font-size: 14px; color: #7d8590; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
    .alert-box { padding: 15px; border-radius: 8px; margin: 10px 0; border: 1px solid #333; font-size: 18px; line-height: 1.5; }
    .alert-yellow { background: #2b2008; color: #ffa657; border-color: #6e4c0a; }
    .alert-red { background: #2d1215; color: #f78166; border-color: #6e2128; }
    .alert-green { background: #0d2a1a; color: #7ee787; border-color: #1a4426; }
    .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
    .compare-card { background: #21262d; padding: 15px; border-radius: 8px; border: 1px solid #30363d; font-size: 16px;}
    .compare-card.danger { background: #2d1215; border-color: #6e2128; }
    .compare-card.safe-card { background: #0d2a1a; border-color: #1a4426; }
    .compare-card h3 { margin-top: 0; color: #7ee787; }
    .stat-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; }
    .stat-pill { background: #21262d; border: 1px solid #30363d; border-radius: 10px; padding: 10px 18px; text-align: center; }
    .stat-pill .sv { font-size: 28px; font-weight: 700; }
    .stat-pill .sl { font-size: 11px; color: #7d8590; margin-top: 2px; text-transform: uppercase;}
    
    .quiz-wrap { display: flex; flex-direction: column; gap: 10px; }
    .quiz-q { font-size: 18px; color: #e6edf3; line-height: 1.5; margin-bottom: 8px; }
    .quiz-opt { padding: 12px 16px; border-radius: 10px; border: 1px solid #30363d; background: #21262d; cursor: pointer; font-size: 15px; color: #c9d1d9; text-align: left; }
    .quiz-opt:hover { border-color: #58a6ff; }
    .quiz-opt.correct { background: #0d2a1a; border-color: #3fb950; color: #7ee787; }
    .quiz-opt.wrong { background: #2d1215; border-color: #f85149; color: #f78166; }
    .quiz-feedback { margin-top: 10px; padding: 10px 14px; border-radius: 8px; font-size: 14px; display: none; line-height: 1.5; }
    .quiz-feedback.show { display: block; }
    .quiz-feedback.ok { background: #0d2a1a; border: 1px solid #3fb950; color: #7ee787; }
    .quiz-feedback.err { background: #2d1215; border: 1px solid #f85149; color: #f78166; }

    .timeline { display: flex; flex-direction: column; gap: 0; }
    .tl-item { display: flex; gap: 16px; position: relative; padding-bottom: 18px; }
    .tl-left { display: flex; flex-direction: column; align-items: center; min-width: 36px; }
    .tl-dot { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
    .tl-line { width: 2px; flex: 1; background: #30363d; margin-top: 4px; }
    .tl-body { padding-top: 6px; }
    .tl-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .tl-points { font-size: 14px; color: #8b949e; line-height: 1.7; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th { background: #21262d; color: #7d8590; padding: 8px; text-align: left; border-bottom: 1px solid #30363d; }
    td { padding: 8px; border-bottom: 1px solid #21262d; font-size: 14px; }
    .toxic { color: #f78166; font-weight: bold; }
    .safe { color: #7ee787; font-weight: bold; }
    .warn { color: #ffa657; font-weight: bold; }
  </style>
</head>

<body>
<div style="display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px;">
  <div style="max-width:850px; width:100%; background:#1e293b; padding:30px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.5);">
    <div id="slide" style="font-size:24px; line-height:1.6; white-space:pre-wrap; margin:0;">Loading...</div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA8IsW3dvtz4oFnGF3NOCHeNVGQsXn6h-c",
    authDomain: "forensic-class-app.firebaseapp.com",
    projectId: "forensic-class-app",
    storageBucket: "forensic-class-app.firebasestorage.app",
    messagingSenderId: "905219571923",
    appId: "1:905219571923:web:f6590bb9b3e36c565c9426"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const slideEl = document.getElementById("slide");
  const studentName = prompt("Please enter your name for attendance:") || "Anonymous";

  // WATERMARK
  function applyWatermark(name) {
    const watermark = document.createElement("div");
    watermark.style.cssText = `position:fixed; top:0; left:0; width:100vw; height:100vh; pointer-events:none; z-index:9999; opacity:0.04; display:flex; flex-wrap:wrap; overflow:hidden; font-size:24px; font-weight:bold; color:white; transform:rotate(-30deg) scale(1.5);`;
    let pattern = "";
    for(let i=0; i<100; i++) { pattern += `${name} - DSMCH &nbsp;&nbsp;&nbsp; `; }
    watermark.innerHTML = pattern;
    document.body.appendChild(watermark);
  }
  applyWatermark(studentName);

  function logActivity(eventName) {
    let ctx = slideEl.innerText.substring(0, 40);
    if (!ctx || ctx.trim() === "") ctx = "Multimedia Slide";
    
    // BUG FIX 1: Do not log anything if the class hasn't started or is locked
    if (ctx.includes("Loading...") || ctx.includes("No data found") || ctx.includes("Session Ended")) {
        return; 
    }

    // BUG FIX 2: Ignore "blur" (Lost Focus) events to stop penalizing mobile notifications
    if (eventName === "Lost Focus (Possible Split-Screen/Notification)") {
        return; 
    }

    db.collection("activity_logs").add({
      student: studentName, 
      event: eventName,
      timestamp: firebase.firestore.FieldValue.serverTimestamp(), 
      slideContext: ctx
    });
  }

// ACTIVITY TRACKING WITH GRACE PERIOD
  let blurTimer;

  // 1. Instant Exit (Tapping a notification and leaving the browser)
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === 'hidden') {
        logActivity("Left App / Switched Tab");
    } else {
        logActivity("Returned to Page");
    }
  });

  // 2. Glancing at a notification (Swiping down)
  window.addEventListener("blur", () => { 
      // Start a 10-second timer when they lose focus
      blurTimer = setTimeout(() => {
          logActivity("Lost Focus for > 10 Seconds"); 
      }, 10000); 
  });

  // 3. Returning from the glance
  window.addEventListener("focus", () => { 
      // If they click back into the class before 10 seconds, cancel the timer!
      clearTimeout(blurTimer); 
  });

  window.onbeforeunload = function() {
    logActivity("Closed / Left Page");
    return "Are you sure you want to leave the lecture?";
  };

  // QUIZ LOGIC
  window.answerQuiz = function(choice, result, quizId) {
    const opts = document.querySelectorAll(`#${quizId} .quiz-opt`);
    opts.forEach(o => { o.disabled = true; o.style.cursor = 'default'; });
    const clicked = opts[['A','B','C','D'].indexOf(choice)];
    if (clicked) clicked.classList.add(result);
    const fb = document.getElementById(`fb-${quizId}`);
    if (fb) fb.className = `quiz-feedback ${result === 'correct' ? 'ok' : 'err'} show`;
    db.collection("activity_logs").add({
      student: studentName, event: result === 'correct' ? "Quiz: Correct" : "Quiz: Wrong",
      timestamp: firebase.firestore.FieldValue.serverTimestamp(), slideContext: `Selected Option: ${choice}`
    });
  };

  // TOPIC LIBRARY (32 Slides for FM216)
  const allTopics = {
    "fm216": [
      { render: () => `
        <div class="slide-title">🦴 FM 2.16</div>
        <div class="slide-subtitle">Medicolegal Examination of Mutilated, Decomposed Bodies & Bones</div>
        <div class="stat-row">
          <div class="stat-pill"><div class="sv" style="color:#f78166">10</div><div class="sl">Questions to Answer</div></div>
          <div class="stat-pill"><div class="sv" style="color:#ffa657">95%</div><div class="sl">Pelvis for Sex</div></div>
          <div class="stat-pill"><div class="sv" style="color:#7ee787">Femur</div><div class="sl">Best for Stature</div></div>
          <div class="stat-pill"><div class="sv" style="color:#58a6ff">Teeth</div><div class="sl">Best for Age + DNA</div></div>
        </div>
        <div class="alert-box alert-yellow" style="margin-top:16px"><strong>When identity is destroyed — Science restores it</strong></div>` 
      },
      { render: () => `
        <div class="slide-title">📖 Textbook Definitions</div>
        <div class="alert-box" style="background:#0d1a2a;border:1px solid #1a3a5c"><strong style="color:#58a6ff">Reddy:</strong><br><span style="color:#c9d1d9">"Mutilated bodies — extensively disfigured, or limb/part lost but <strong>soft tissues still attached to bones</strong>"</span></div>
        <div class="alert-box" style="background:#1a1400;border:1px solid #3a2f00"><strong style="color:#ffa657">Modi:</strong><br><span style="color:#c9d1d9">"Mutilation is <strong>NOT always criminal</strong> — animals can mutilate in a very short time"</span></div>
        <div class="alert-box" style="background:#0d2a1a;border:1px solid #1a4426"><strong style="color:#7ee787">Parikh:</strong><br><span style="color:#c9d1d9">"<strong>Fragmentary remains</strong> — only fragments such as head, trunk or limb"</span></div>` 
      },
      { render: () => `
        <div class="slide-title">⚡ Causes of Mutilation</div>
        <div class="compare-grid">
          <div class="compare-card danger"><h3 style="color:#f78166">Criminal</h3><ul><li>Concealment of identity</li><li>Easier disposal of body</li><li>Skilled — joint separation</li></ul></div>
          <div class="compare-card"><h3 style="color:#a78bfa">Animal Scavenging</h3><ul><li>Rats, dogs, jackals, vultures</li><li>Haphazard wounds</li><li>Gnaw marks on bone</li></ul></div>
          <div class="compare-card safe-card"><h3 style="color:#7ee787">Natural / Accidental</h3><ul><li>Decomposition — ligament separation</li><li>Moving vehicles (RTA)</li><li>Bomb explosions</li></ul></div>
          <div class="compare-card"><h3 style="color:#ffa657">📌 Key Point</h3><ul><li>Each cause leaves <strong>different marks</strong></li><li>Determining manner is critical for court</li></ul></div>
        </div>` 
      },
      { render: () => `
        <div class="slide-title">🎯 10 Questions to Answer</div>
        <div class="slide-subtitle">Primary goal of examining mutilated remains</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          ${[["1","Human or Animal?","#f78166"],["2","Same individual or multiple?","#f78166"],["3","Age","#ffa657"],["4","Sex","#ffa657"],["5","Stature","#ffa657"],["6","Race","#ffa657"],["7","Identity","#7ee787"],["8","Manner of separation","#7ee787"],["9","Cause of death","#58a6ff"],["10","Time since death","#58a6ff"]].map(([n,q,c]) => `
            <div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:#21262d;border-radius:8px;border:1px solid #30363d">
              <span style="font-size:18px;font-weight:700;color:${c};min-width:24px">${n}</span><span style="font-size:15px;color:#c9d1d9">${q}</span>
            </div>`).join('')}
        </div>` 
      },
      { render: () => `
        <div class="slide-title">🧠 The Diagnostic Sequence</div>
        <div class="slide-subtitle">The strict logical dependency of skeletal analysis</div>
        <div class="timeline">
          <div class="tl-item"><div class="tl-left"><div class="tl-dot" style="background:#2d1215;color:#f78166">1</div><div class="tl-line"></div></div><div class="tl-body"><div class="tl-title" style="color:#f78166">Origin: Human vs. Animal</div><div class="tl-points"><strong>The Threshold:</strong> If tests prove animal origin, the investigation concludes immediately.</div></div></div>
          <div class="tl-item"><div class="tl-left"><div class="tl-dot" style="background:#2b2008;color:#ffa657">2</div><div class="tl-line"></div></div><div class="tl-body"><div class="tl-title" style="color:#ffa657">Determine Sex</div><div class="tl-points"><strong>Why before Age/Stature?</strong> Male and female skeletons develop at different rates. Guessing sex ruins stature accuracy because formulae are sex-specific.</div></div></div>
          <div class="tl-item"><div class="tl-left"><div class="tl-dot" style="background:#0a1628;color:#58a6ff">3</div><div class="tl-line"></div></div><div class="tl-body"><div class="tl-title" style="color:#58a6ff">Estimate Age</div><div class="tl-points"><strong>Why before Stature?</strong> Stature formulae are <em>only valid for fully grown adults</em>. You cannot apply adult formulae to growing children.</div></div></div>
          <div class="tl-item"><div class="tl-left"><div class="tl-dot" style="background:#0d2a1a;color:#7ee787">4</div></div><div class="tl-body"><div class="tl-title" style="color:#7ee787">Calculate Stature</div><div class="tl-points"><strong>The Final Synthesis:</strong> Relies entirely on the demographic profile established in Steps 2 and 3.</div></div></div>
        </div>` 
      },
      { render: () => `
        <div class="slide-title">❓ Q1 — Human or Animal?</div>
        <div class="timeline">
          <div class="tl-item"><div class="tl-left"><div class="tl-dot" style="background:#0d2a1a;color:#7ee787">1</div><div class="tl-line"></div></div><div class="tl-body"><div class="tl-title" style="color:#7ee787">Gross Examination</div><div class="tl-points">Shape, structure and weight usually distinguish human remains from animal.</div></div></div>
          <div class="tl-item"><div class="tl-left"><div class="tl-dot" style="background:#0a1628;color:#58a6ff">2</div><div class="tl-line"></div></div><div class="tl-body"><div class="tl-title" style="color:#58a6ff">For Isolated Soft Tissue</div><div class="tl-points"><strong>Precipitin test ⭐</strong> — confirms human protein. Anti-globulin inhibition test — alternative.</div></div></div>
          <div class="tl-item"><div class="tl-left"><div class="tl-dot" style="background:#2b2008;color:#ffa657">3</div></div><div class="tl-body"><div class="tl-title" style="color:#ffa657">Anatomy Room Artefacts — Rule Out</div><div class="tl-points">Formalin odour. Red lead injected in blood vessels. Preserved, non-decomposed appearance.</div></div></div>
        </div>` 
      },
      { render: () => `
        <div class="slide-title">❓ Q2 — Same Individual?</div>
        <div class="compare-grid">
          <div class="compare-card"><h3 style="color:#ffa657">Assembly Method</h3><ul><li>Anatomically align all parts</li><li>Jigsaw method</li><li>Check consistent skin colour</li></ul></div>
          <div class="compare-card danger"><h3 style="color:#f78166">⭐ Reduplication Rule</h3><ul><li>Two RIGHT humeri = Minimum TWO victims</li><li>Count all unpaired bones</li><li>MNI — Minimum Number of Individuals</li></ul></div>
        </div>
        <div class="alert-box alert-green"><strong>Confirmation:</strong> Blood grouping + DNA profiling ⭐ — definitive proof.</div>` 
      },
      { render: () => `
        <div class="slide-title">♀♂ Q3 — Determining Sex</div>
        <div class="alert-box alert-yellow"><strong>From decomposed soft tissue:</strong><br>Prostate (male) and non-pregnant uterus (female) are <strong>rot-resistant</strong> ⭐ — confirm sex even in advanced decomposition.</div>
        <div class="compare-grid">
          <div class="compare-card" style="background:#0d1a2a;border-color:#1a3a5c"><h3 style="color:#58a6ff">Female Pelvis</h3><ul><li>Subpubic angle <strong>&gt;90°</strong></li><li>Circular pelvic inlet</li><li>Wide greater sciatic notch</li></ul></div>
          <div class="compare-card" style="background:#2a1a2a;border-color:#4a2a4a"><h3 style="color:#d2a8ff">Male Pelvis</h3><ul><li>Subpubic angle <strong>&lt;70°</strong></li><li>Heart-shaped inlet</li><li>Narrow sciatic notch</li></ul></div>
        </div>
        <div class="alert-box alert-green"><strong>Pelvis = 95% accurate ⭐⭐</strong> — most reliable bone for sex determination.</div>` 
      },
      { render: () => `
        <div class="slide-title">💀 Sex from Skull</div>
        <table>
          <thead><tr><th>Feature</th><th>Female</th><th>Male</th></tr></thead>
          <tbody>
            <tr><td>Overall</td><td class="safe">Smooth, rounded</td><td class="warn">Rugged, angular</td></tr>
            <tr><td>Mastoid process</td><td class="safe">Small</td><td class="warn">Large, prominent</td></tr>
            <tr><td>Supraorbital ridges</td><td class="safe">Absent / faint</td><td class="warn">Prominent</td></tr>
            <tr><td>Chin</td><td class="safe">Pointed</td><td class="warn">Square</td></tr>
            <tr><td>Forehead</td><td class="safe">Vertical, rounded</td><td class="warn">Sloping</td></tr>
            <tr><td>Orbital margins</td><td class="safe">Sharp</td><td class="warn">Rounded/blunt</td></tr>
          </tbody>
        </table>
        <div class="alert-box alert-yellow">📌 Skull accuracy = 90% &nbsp;•&nbsp; Pelvis accuracy = 95% &nbsp;•&nbsp; <strong>Always prefer pelvis</strong></div>` 
      },
      { render: () => `
        <div class="slide-title">🎂 Q4 — Determining Age</div>
        <div class="compare-grid">
          <div class="compare-card"><h3 style="color:#ffa657">From Bones</h3><ul><li>Epiphyseal union — growing age</li><li>Cranial suture closure — adult</li><li>Pubic symphysis changes</li></ul></div>
          <div class="compare-card safe-card"><h3 style="color:#7ee787">From Teeth ⭐ Most Reliable</h3><ul><li>Children: Eruption sequence / Demirjian method</li><li>Adults: Attrition / wear / Root transparency</li><li>Adults: Secondary dentine / Cementum annulation</li></ul></div>
        </div>
        <div class="alert-box alert-green"><strong>Teeth = most reliable for age in all age groups ⭐</strong></div>` 
      },
      { render: () => `
        <div class="slide-title">📏 Q5 — Stature from Long Bones</div>
        <div class="slide-subtitle">Based on constant ratio of bone length to total height</div>
        <div class="stat-row">
          <div class="stat-pill"><div class="sv" style="color:#7ee787">Femur</div><div class="sl">Most accurate ⭐</div></div>
          <div class="stat-pill"><div class="sv" style="color:#58a6ff">Tibia</div><div class="sl">2nd choice</div></div>
          <div class="stat-pill"><div class="sv" style="color:#ffa657">Humerus</div><div class="sl">Upper limb</div></div>
        </div>
        <div class="alert-box alert-yellow"><strong>Two methods:</strong><br>A) Karl Pearson Multiplication Factors — quick, single bone<br>B) Trotter-Gleser Regression Equations — more precise</div>
        <div class="alert-box alert-green"><strong>Living height = Skeletal height + 2 to 4 cm</strong> (soft tissues — intervertebral discs, scalp)</div>` 
      },
      { render: () => `
        <div class="slide-title">📐 Pearson Multiplication Factors</div>
        <table>
          <thead><tr><th>Bone</th><th>Factor</th><th>Example (45 cm bone)</th></tr></thead>
          <tbody>
            <tr><td><strong>Femur ⭐</strong></td><td class="safe" style="font-size:18px;">× 3.7</td><td style="color:#7ee787">45 × 3.7 = <strong>166.5 cm</strong></td></tr>
            <tr><td>Tibia</td><td class="warn" style="font-size:18px;">× 4.3</td><td style="color:#ffa657">45 × 4.3 = 193.5 cm</td></tr>
            <tr><td>Humerus</td><td class="toxic" style="font-size:18px;">× 5.3</td><td style="color:#f78166">45 × 5.3 = 238.5 cm</td></tr>
          </tbody>
        </table>
        <div class="alert-box alert-yellow"><strong>Limitations:</strong> Simple but less accurate. Use only when single bone found. No population correction.</div>` 
      },
      { render: () => `
        <div class="slide-title">🔬 Trotter-Gleser Regression</div>
        <div class="alert-box" style="background:#0d2a1a;border:1px solid #1a4426;text-align:center">
          <span style="color:#7ee787;font-size:18px;font-weight:600">Stature (cm) = (2.32 × Femur length) + 65.53 ± 3.94</span><br>
          <span style="color:#c9d1d9;font-size:14px">For male — general formula</span>
        </div>
        <div class="alert-box alert-green"><strong>Add 2–4 cm</strong> for living stature (soft tissue correction)</div>
        <div class="alert-box alert-yellow"><strong>Subtract 1.5%</strong> for dry ancient bone (shrinkage correction)</div>
        <div class="alert-box" style="background:#0d1a2a;border:1px solid #1a3a5c"><strong style="color:#58a6ff">Fragmentary bone?</strong> Use <strong>Steele & McKern method</strong> — estimate full bone length first, then apply formula.</div>` 
      },
      { render: () => `
        <div class="slide-title">🌍 Q6 — Race from Skull</div>
        <table>
          <thead><tr><th>Feature</th><th>Caucasoid</th><th>Negroid</th><th>Mongoloid</th></tr></thead>
          <tbody>
            <tr><td>Nasal aperture</td><td>Narrow, pointed</td><td class="toxic">Wide, flat</td><td>Medium</td></tr>
            <tr><td>Prognathism</td><td>Orthognathic</td><td class="toxic">Prognathic</td><td>Flat face</td></tr>
            <tr><td>Incisors</td><td>Normal</td><td>Normal</td><td class="warn">Shovel-shaped ⭐</td></tr>
          </tbody>
        </table>
        <div class="alert-box alert-red"><strong>⚠ Least reliable parameter</strong> — significant overlap between groups.</div>` 
      },
      { render: () => `
        <div class="slide-title">🪪 Q7 — Establishing Identity</div>
        <div class="compare-grid">
          <div class="compare-card safe-card"><h3 style="color:#7ee787">Scientific Methods ⭐</h3><ul><li>DNA profiling — tooth pulp + petrous bone</li><li>Dental records — ante vs postmortem</li><li>Fingerprints — skin slip method</li><li>Superimposition photography</li></ul></div>
          <div class="compare-card"><h3 style="color:#ffa657">Physical Evidence</h3><ul><li>Jewellery, clothing</li><li>Surgical implants — serial numbers</li><li>Tattoos — even in decomposition</li></ul></div>
        </div>
        <div class="alert-box alert-yellow"><strong>Best for fire/disaster victims:</strong> Dental records + DNA<br><strong>Best for decomposed:</strong> Tooth root pulp DNA ⭐⭐</div>` 
      },
      { render: () => `
        <div class="slide-title">🎯 Superimposition Photography</div>
        <div class="timeline">
          <div class="tl-item"><div class="tl-left"><div class="tl-dot" style="background:#0d2a1a;color:#7ee787">1</div><div class="tl-line"></div></div><div class="tl-body"><div class="tl-title" style="color:#7ee787">Technique</div><div class="tl-points">Victim's antemortem photograph overlaid on the recovered skull. Bony landmarks and dental pattern are checked for match.</div></div></div>
          <div class="tl-item"><div class="tl-left"><div class="tl-dot" style="background:#0a1628;color:#58a6ff">2</div><div class="tl-line"></div></div><div class="tl-body"><div class="tl-title" style="color:#58a6ff">Used When</div><div class="tl-points">Missing persons • Historical cases • No DNA available • Disaster Victim Identification (DVI)</div></div></div>
